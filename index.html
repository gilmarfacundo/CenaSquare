          </div>\n        )}\n\n        {/* Input de link expandido */}\n        {prev && showLink && (\n          <div onClick={e=>e.stopPropagation()}\n            style={{position:\"absolute\",bottom:0,left:0,right:0,\n              background:\"#0e0e1e\",borderTop:\"1.5px solid #AA00FF33\",\n              padding:\"clamp(14px,4vw,18px)\",\n              backdropFilter:\"blur(20px)\"}}>\n            <p style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(9px,2.5vw,11px)\",\n              color:\"#AA00FF\",letterSpacing:.5,marginBottom:9}}>\ud83d\udd17 LINK DO STORY</p>\n            <div style={{display:\"flex\",gap:8}}>\n              <input value={link} onChange={e=>setLink(e.target.value)}\n                placeholder=\"exemplo.com.br ou URL completa\"\n                autoCapitalize=\"none\" autoCorrect=\"off\" inputMode=\"url\"\n                style={{flex:1,background:\"#ffffff0d\",border:`1.5px solid ${link?\"#AA00FF55\":\"#ffffff18\"}`,\n                  borderRadius:12,padding:\"clamp(10px,3vw,13px) 12px\",\n                  color:\"#fff\",fontSize:\"clamp(13px,3.5vw,15px)\"}} />\n              <button onClick={()=>setShowLink(false)}\n                style={{background:\"linear-gradient(135deg,#AA00FF,#FF0055)\",border:\"none\",borderRadius:12,\n                  padding:\"0 16px\",color:\"#fff\",fontWeight:700,fontSize:\"clamp(12px,3.5vw,14px)\"}}>OK</button>\n            </div>\n            {link && (\n              <button onClick={()=>{ setLink(\"\"); setShowLink(false); }}\n                style={{marginTop:8,color:\"#FF005588\",fontSize:\"clamp(10px,2.8vw,12px)\"}}>\n                \u2715 Remover link\n              </button>\n            )}\n            <p style={{marginTop:8,fontSize:\"clamp(9px,2.5vw,10px)\",color:\"#ffffff33\"}}>\n              O link aparecer\u00e1 como bot\u00e3o \"Ver mais\" no seu story\n            </p>\n          </div>\n        )}\n\n        {prev && mediaType===\"video\" && (\n          <div style={{position:\"absolute\",bottom:showLink?120:14,left:\"50%\",transform:\"translateX(-50%)\",\n            background:\"#000000cc\",backdropFilter:\"blur(8px)\",borderRadius:20,padding:\"6px 14px\",\n            fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#FFD700\",display:\"flex\",alignItems:\"center\",gap:6,\n            border:\"1.5px solid #FFD70033\"}}>\n            \u23f1\ufe0f Apenas os primeiros 10s ser\u00e3o exibidos\n          </div>\n        )}\n      </div>\n\n      {/* Bottom: caption + file input */}\n      <div style={{flexShrink:0,background:\"#0c0c1a\",borderTop:\"1px solid #ffffff0a\",\n        padding:\"clamp(10px,3vw,14px) 12px\",\n        paddingBottom:\"calc(clamp(10px,3vw,14px) + env(safe-area-inset-bottom,0px))\"}}>\n        {prev && (\n          <div style={{display:\"flex\",gap:10,alignItems:\"center\",marginBottom:11}}>\n            <Av init={me?.av||\"EU\"} size={34} img={me?.img} />\n            <input value={caption} onChange={e=>setCaption(e.target.value)}\n              placeholder=\"Legenda do story\u2026 (opcional)\"\n              style={{flex:1,background:\"#ffffff0d\",border:\"1.5px solid #ffffff18\",borderRadius:20,\n                padding:\"clamp(9px,2.5vw,11px) 14px\",color:\"#fff\",fontSize:\"clamp(13px,3.5vw,14px)\"}} />\n          </div>\n        )}\n        <input ref={fileRef} type=\"file\" accept=\"image/*,video/*\" style={{display:\"none\"}} onChange={pick} />\n        {!prev && (\n          <button onClick={()=>fileRef.current?.click()}\n            style={{width:\"100%\",background:\"linear-gradient(135deg,#AA00FF,#FF0055)\",border:\"none\",\n              borderRadius:14,padding:\"clamp(13px,3.5vw,16px)\",color:\"#fff\",\n              fontSize:\"clamp(13px,3.5vw,15px)\",fontWeight:700,fontFamily:\"'Orbitron',monospace\",\n              boxShadow:\"0 4px 20px #AA00FF44\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",gap:9}}>\n            <span style={{fontSize:\"clamp(18px,5vw,22px)\"}}>\ud83d\udcf7</span> ESCOLHER FOTO / V\u00cdDEO\n          </button>\n        )}\n      </div>\n    </div>\n  );\n}\n";

function compilePart(code,label,done){
  st('compilando '+label+'...');
  setTimeout(function(){
    try{
      var out=Babel.transform(code,{presets:['react'],sourceType:'script'}).code;
      (0,eval)(out);
      done(null);
    }catch(e){done(e);}
  },20);
}

st('carregando...');
setTimeout(function(){
  compilePart(P1,'1/3',function(e1){
    if(e1) return showError('P1: '+e1.message);
    compilePart(P2,'2/3',function(e2){
      if(e2) return showError('P2: '+e2.message);
      compilePart(P3,'3/3',function(e3){
        if(e3) return showError('P3: '+e3.message);
        setTimeout(function(){
          st('montando app...');
          try{
            document.getElementById('sp').remove();
            ReactDOM.createRoot(document.getElementById('root'))
              .render(React.createElement(App));
          }catch(e){showError('mount: '+e.message);}
        },20);
      });
    });
  });
},100);
</script>
</body>
</html>
