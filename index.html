<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CenaSquare" />
  <meta name="description" content="Rede Social LGBTQIAPN+ · Brasília" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌈</text></svg>" />
  <title>CenaSquare</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #07070f; }
    #root { width: 100%; height: 100%; display: flex; flex-direction: column; }
    #splash {
      position: fixed; inset: 0; background: #07070f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 9999;
      font-family: 'Orbitron', monospace;
    }
    #splash-ring {
      width: 60px; height: 60px; border-radius: 50%;
      border: 4px solid #ffffff11;
      border-top-color: #AA00FF;
      animation: spin 0.9s linear infinite;
    }
    #splash-text {
      font-size: 13px; letter-spacing: 3px;
      background: linear-gradient(90deg,#FF0055,#FF6B00,#FFD700,#00E676,#00B4FF,#AA00FF);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
  </style>
</head>
<body>
  <!-- Splash screen shown while Babel compiles -->
  <div id="splash">
    <div id="splash-ring"></div>
    <div id="splash-text">CENASQUARE</div>
  </div>

  <div id="root"></div>

  <!-- React 18 UMD -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone (JSX compiler) -->
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <script>
    // Expose React hooks globally BEFORE Babel compiles the app code
    window.useState    = React.useState;
    window.useEffect   = React.useEffect;
    window.useRef      = React.useRef;
    window.useCallback = React.useCallback;

    // Load and compile app.jsx via fetch + Babel async compile
    // This avoids blocking the main thread and allows the splash to show
    async function loadApp() {
      try {
        const res  = await fetch('app.jsx');
        const code = await res.text();

        // Compile with Babel (synchronous but called after splash renders)
        const compiled = Babel.transform(code, {
          presets: ['react'],
          plugins: [],
          filename: 'app.jsx'
        }).code;

        // Execute compiled code
        // eslint-disable-next-line no-new-func
        const fn = new Function(
          'React','ReactDOM',
          'useState','useEffect','useRef','useCallback',
          compiled + '\nreturn typeof App !== "undefined" ? App : null;'
        );

        const App = fn(
          React, ReactDOM,
          React.useState, React.useEffect, React.useRef, React.useCallback
        );

        if (!App) throw new Error('App component not found after compilation');

        // Remove splash and mount
        document.getElementById('splash').remove();
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));

      } catch(err) {
        document.getElementById('splash-ring').style.display = 'none';
        document.getElementById('splash-text').textContent = 'Erro: ' + err.message;
        document.getElementById('splash-text').style.color = '#FF0055';
        document.getElementById('splash-text').style['-webkit-text-fill-color'] = '#FF0055';
        console.error('CenaSquare load error:', err);
      }
    }

    // Start loading after current frame (lets splash paint first)
    requestAnimationFrame(() => setTimeout(loadApp, 50));
  </script>
</body>
</html>
