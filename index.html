0\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction MyTicketsView({ myTix }) {\n  return (\n    <div style={{padding:\"0 12px\"}}>\n      <h3 style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(11px,3vw,13px)\",letterSpacing:2,color:\"#FFD700\",marginBottom:14}}>\ud83c\udf9f\ufe0f MEUS INGRESSOS</h3>\n      {myTix.length===0\n        ? <div style={{textAlign:\"center\",padding:\"clamp(32px,8vw,52px) 20px\"}}>\n            <div style={{fontSize:\"clamp(36px,10vw,50px)\",marginBottom:12}}>\ud83c\udf9f\ufe0f</div>\n            <p style={{color:\"#ffffff77\",fontSize:\"clamp(12px,3.5vw,14px)\",lineHeight:1.6}}>Voc\u00ea ainda n\u00e3o tem ingressos.<br/>Explore os eventos!</p>\n          </div>\n        : myTix.map((t,i)=>(\n            <div key={i} style={{background:\"#0c0c1a\",border:\"1.5px solid #FFD70022\",borderRadius:16,padding:\"clamp(14px,4vw,18px)\",marginBottom:12,position:\"relative\",overflow:\"hidden\"}}>\n              <div style={{position:\"absolute\",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${RAINBOW.join(\",\")})`}} />\n              <div style={{display:\"flex\",gap:12,alignItems:\"center\",marginBottom:12}}>\n                <div style={{fontSize:\"clamp(28px,8vw,38px)\",flexShrink:0}}>{t.ico||\"\ud83c\udfab\"}</div>\n                <div style={{flex:1,minWidth:0}}>\n                  <div style={{fontWeight:700,fontSize:\"clamp(13px,3.5vw,15px)\",color:\"#fff\",marginBottom:2}}>{t.event}</div>\n                  <div style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffff77\"}}>\ud83d\udcc5 {t.date} \u00b7 \ud83d\udccd {t.venue}</div>\n                </div>\n                <div style={{background:\"#00E67622\",border:\"1.5px solid #00E67644\",borderRadius:8,padding:\"4px 10px\",flexShrink:0}}>\n                  <div style={{fontSize:\"clamp(8px,2.2vw,10px)\",color:\"#00E676\",fontFamily:\"'Orbitron',monospace\",letterSpacing:.5}}>V\u00c1LIDO</div>\n                </div>\n              </div>\n              <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",padding:\"clamp(8px,2.5vw,11px) 0\",borderTop:\"1px solid #ffffff09\",borderBottom:\"1px solid #ffffff09\",marginBottom:10}}>\n                <div>\n                  <div style={{fontSize:\"clamp(9px,2.5vw,10px)\",color:\"#ffffff55\",marginBottom:2,fontFamily:\"'Orbitron',monospace\"}}>C\u00d3DIGO</div>\n                  <div style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(11px,3.2vw,14px)\",color:\"#AA00FF\",letterSpacing:2}}>{t.code}</div>\n                </div>\n                <div style={{textAlign:\"right\"}}>\n                  <div style={{fontSize:\"clamp(9px,2.5vw,10px)\",color:\"#ffffff55\",marginBottom:2}}>PAGO</div>\n                  <div style={{fontWeight:700,fontSize:\"clamp(13px,3.5vw,16px)\",color:\"#FFD700\"}}>{t.price}</div>\n                </div>\n              </div>\n              <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",flexWrap:\"wrap\",gap:6}}>\n                <div style={{display:\"flex\",alignItems:\"center\",gap:6}}>\n                  <span style={{fontSize:\"clamp(12px,3.5vw,15px)\"}}>\ud83d\udce7</span>\n                  <span style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#00E676\"}}>Email enviado</span>\n                </div>\n                <span style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff44\"}}>{t.purchasedAt}</span>\n              </div>\n            </div>\n          ))\n      }\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 PROFILE \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction ProfileView({ me, myProfile, posts, onTicket, isAdmin, onSettings, notifs, onEdit, onFollowers, onFollowing, onSearch, followCount, followerCount }) {\n  const [pt,setPt]=useState(\"posts\");\n  if (!me) return null;\n  const filtered = pt===\"posts\"?posts:posts.filter(p=>p.ev);\n  const totalPosts = posts.length;\n  return (\n    <div>\n      <div style={{padding:\"0 14px clamp(12px,3.5vw,16px)\"}}>\n        {/* Header row: avatar + stats */}\n        <div style={{display:\"flex\",gap:\"clamp(10px,3vw,14px)\",alignItems:\"center\",marginBottom:13}}>\n          <div onClick={onEdit} style={{cursor:\"pointer\",flexShrink:0}}>\n            <Av init={me.av||\"EU\"} size=\"clamp(64px,19vw,80px)\"\n              img={myProfile.avatarUrl||me.img||null} rainbow />\n          </div>\n          <div style={{flex:1,minWidth:0}}>\n            <div style={{display:\"flex\",alignItems:\"center\",gap:7,marginBottom:2,flexWrap:\"wrap\"}}>\n              <span style={{fontWeight:700,fontSize:\"clamp(14px,4vw,17px)\",color:\"#fff\"}}>{myProfile.displayName||me.username}</span>\n              {isAdmin && <span style={{fontSize:9,background:\"#FFD70020\",border:\"1.5px solid #FFD70040\",borderRadius:6,padding:\"2px 7px\",color:\"#FFD700\",fontFamily:\"'Orbitron',monospace\"}}>ADMIN</span>}\n            </div>\n            <div style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffffaa\",marginBottom:9,wordBreak:\"break-word\"}}>\n              {myProfile.bio||me.bio}\n              {myProfile.website&&<div style={{color:\"#00B4FF\",marginTop:2}}>{myProfile.website}</div>}\n            </div>\n            {/* Stats: posts / seguidores / seguindo */}\n            <div style={{display:\"flex\",gap:\"clamp(10px,3vw,18px)\"}}>\n              <div style={{textAlign:\"center\"}}>\n                <div style={{fontWeight:700,fontSize:\"clamp(13px,3.5vw,16px)\",color:\"#fff\"}}>{totalPosts}</div>\n                <div style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff77\"}}>posts</div>\n              </div>\n              <div style={{textAlign:\"center\",cursor:\"pointer\"}} onClick={onFollowers}>\n                <div style={{fontWeight:700,fontSize:\"clamp(13px,3.5vw,16px)\",color:\"#fff\"}}>{followerCount}</div>\n                <div style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff77\"}}>seguidores</div>\n              </div>\n              <div style={{textAlign:\"center\",cursor:\"pointer\"}} onClick={onFollowing}>\n                <div style={{fontWeight:700,fontSize:\"clamp(13px,3.5vw,16px)\",color:\"#fff\"}}>{followCount}</div>\n                <div style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff77\"}}>seguindo</div>\n              </div>\n            </div>\n          </div>\n        </div>\n        {/* Action buttons */}\n        <div style={{display:\"flex\",gap:8,marginBottom:notifs.length>0?10:0}}>\n          <button onClick={onEdit}\n            style={{flex:1,background:\"linear-gradient(135deg,#AA00FF22,#FF005522)\",border:\"1.5px solid #AA00FF44\",borderRadius:10,padding:\"clamp(8px,2.5vw,10px)\",color:\"#fff\",fontSize:\"clamp(11px,3vw,13px)\",fontWeight:600,display:\"flex\",alignItems:\"center\",justifyContent:\"center\",gap:6}}>\n            \u270f\ufe0f Editar Perfil\n          </button>\n          <button onClick={onSearch}\n            style={{background:\"#ffffff0d\",border:\"1.5px solid #ffffff18\",borderRadius:10,padding:\"clamp(8px,2.5vw,10px) 14px\",color:\"#ffffffcc\",fontSize:\"clamp(14px,4vw,17px)\"}}>\ud83d\udd0d</button>\n          <button onClick={onSettings}\n            style={{background:\"#ffffff0d\",border:\"1.5px solid #ffffff18\",borderRadius:10,padding:\"clamp(8px,2.5vw,10px) 14px\",color:\"#ffffffcc\",fontSize:\"clamp(14px,4vw,17px)\"}}>\u2699\ufe0f</button>\n        </div>\n        {notifs.length>0 && (\n          <div style={{background:\"#FF005512\",border:\"1.5px solid #FF005533\",borderRadius:9,padding:\"9px 12px\"}}>\n            <p style={{fontSize:\"clamp(8px,2.2vw,10px)\",fontFamily:\"'Orbitron',monospace\",color:\"#FF0055\",marginBottom:3}}>NOTIFICA\u00c7\u00d5ES</p>\n            {notifs.slice(-3).map(n=><p key={n.id} style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffffcc\",marginTop:2}}>\u26a0 {n.txt}</p>)}\n          </div>\n        )}\n      </div>\n      {/* Tabs */}\n      <div style={{display:\"flex\",borderBottom:\"1.5px solid #ffffff0d\"}}>\n        {[\"posts\",\"eventos\"].map(t=>(\n          <button key={t} onClick={()=>setPt(t)} style={{flex:1,background:\"none\",color:pt===t?\"#fff\":\"#ffffff55\",\n            padding:\"clamp(8px,2.5vw,11px) 0\",fontSize:\"clamp(9px,2.5vw,11px)\",fontFamily:\"'Orbitron',monospace\",letterSpacing:1,\n            borderBottom:pt===t?\"2.5px solid #AA00FF\":\"2.5px solid transparent\",transition:\"all .2s\"}}>\n            {t.toUpperCase()}\n          </button>\n        ))}\n      </div>\n      {filtered.length===0\n        ? <div style={{textAlign:\"center\",padding:\"clamp(32px,8vw,52px) 20px\",color:\"#ffffff44\",fontSize:\"clamp(12px,3.5vw,14px)\"}}>\n            {pt===\"posts\"?\"Nenhuma publica\u00e7\u00e3o ainda.\":\"Nenhum evento ainda.\"}\n          </div>\n        : <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr 1fr\",gap:1.5,marginTop:1.5}}>\n            {filtered.map(p=>(\n              <div key={p.id} onClick={()=>p.tk&&onTicket(p.tk)} style={{aspectRatio:\"1\",overflow:\"hidden\",position:\"relative\",cursor:p.tk?\"pointer\":\"default\"}}>\n                <img src={p.img} alt=\"\" style={{width:\"100%\",height:\"100%\",objectFit:\"cover\"}} onError={e=>e.target.style.display=\"none\"} />\n                {p.ev && <div style={{position:\"absolute\",top:4,right:4,fontSize:\"clamp(10px,3vw,13px)\"}}>\ud83c\udfab</div>}\n                {p.T && <div style={{position:\"absolute\",top:4,left:4,fontSize:9,background:\"#FF005599\",borderRadius:4,padding:\"2px 5px\",fontFamily:\"'Orbitron',monospace\",color:\"#fff\",fontWeight:700}}>T</div>}\n              </div>\n            ))}\n          </div>\n      }\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 DM LIST \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction DMList({ chats, nearby, onOpen }) {\n  return (\n    <div style={{padding:\"0 12px\"}}>\n      <h3 style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(11px,3vw,13px)\",letterSpacing:2,marginBottom:14,color:\"#fff\"}}>\u2709 MENSAGENS</h3>\n      {nearby.filter(u=>!u.bl).slice(0,8).map(u=>{\n        const msgs=chats[u.uid]||[],last=msgs[msgs.length-1];\n        return (\n          <div key={u.id} onClick={()=>onOpen(u)}\n            style={{display:\"flex\",alignItems:\"center\",gap:\"clamp(9px,3vw,13px)\",padding:\"clamp(10px,3vw,13px) 0\",borderBottom:\"1px solid #ffffff0a\",cursor:\"pointer\"}}>\n            <Av init={u.av} size=\"clamp(42px,11vw,50px)\" img={u.p1} online={u.on} />\n            <div style={{flex:1,minWidth:0}}>\n              <div style={{display:\"flex\",justifyContent:\"space-between\",marginBottom:2}}>\n                <span style={{fontWeight:700,fontSize:\"clamp(12px,3.5vw,15px)\",color:\"#fff\"}}>{u.sn}</span>\n                <span style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff55\"}}>{u.dist}</span>\n              </div>\n              <span style={{fontSize:\"clamp(11px,3vw,13px)\",color:\"#ffffffaa\",overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\",display:\"block\"}}>\n                {last ? last.once ? \"\ud83d\udd25 Foto \u00fanica\" : last.img ? \"\ud83d\udcf7 Foto\" : last.text : \"Inicie a conversa\u2026\"}\n              </span>\n            </div>\n          </div>\n        );\n      })}\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 CHAT \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// \u2500\u2500 Componente de mensagem de foto \u00fanica \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction OncePhoto({ msg, isMine }) {\n  const [state, setState] = useState(msg.viewed ? \"viewed\" : \"ready\");\n  // \"ready\" = bolha fechada | \"open\" = contagem regressiva | \"viewed\" = expirado\n  const [secs,  setSecs]  = useState(20);\n  const timerRef = useRef(null);\n  const [, forceUpdate] = useState(0);\n\n  const open = () => {\n    if (state !== \"ready\") return;\n    setState(\"open\");\n    setSecs(20);\n    // marca como visto no objeto original para n\u00e3o reabrir\n    msg.viewed = true;\n    timerRef.current = setInterval(() => {\n      setSecs(s => {\n        if (s <= 1) {\n          clearInterval(timerRef.current);\n          setState(\"viewed\");\n          forceUpdate(n=>n+1);\n          return 0;\n        }\n        return s - 1;\n      });\n    }, 1000);\n  };\n\n  useEffect(() => () => clearInterval(timerRef.current), []);\n\n  const bubbleBg = isMine\n    ? \"linear-gradient(135deg,#AA00FF,#FF0055)\"\n    : \"#ffffff12\";\n\n  // \u2500\u2500 ESTADO: j\u00e1 expirou \u2500\u2500\n  if (state === \"viewed\") {\n    return (\n      <div style={{background: bubbleBg, borderRadius: isMine?\"18px 18px 5px 18px\":\"18px 18px 18px 5px\",\n        padding:\"10px 14px\", display:\"flex\", alignItems:\"center\", gap:8, opacity:.6}}>\n        <span style={{fontSize:18}}>\ud83d\udd25</span>\n        <span style={{fontSize:\"clamp(11px,3vw,13px)\", color:\"#fff\"}}>Foto expirada</span>\n      </div>\n    );\n  }\n\n  // \u2500\u2500 ESTADO: contagem regressiva \u2500\u2500\n  if (state === \"open\") {\n    return (\n      <div style={{position:\"relative\", borderRadius: isMine?\"18px 18px 5px 18px\":\"18px 18px 18px 5px\",\n        overflow:\"hidden\", maxWidth:\"min(220px,65vw)\"}}>\n        <img src={msg.img} alt=\"\" style={{width:\"100%\", display:\"block\",\n          borderRadius: isMine?\"18px 18px 5px 18px\":\"18px 18px 18px 5px\"}} />\n        {/* countdown overlay */}\n        <div style={{position:\"absolute\", top:8, right:8,\n          background:\"#000000cc\", backdropFilter:\"blur(6px)\",\n          borderRadius:20, padding:\"4px 10px\",\n          display:\"flex\", alignItems:\"center\", gap:5}}>\n          <span style={{fontSize:12}}>\ud83d\udd25</span>\n          <span style={{fontFamily:\"'Orbitron',monospace\", fontSize:13,\n            fontWeight:700, color: secs<=5?\"#FF0055\":\"#fff\"}}>{secs}s</span>\n        </div>\n        {/* progress ring */}\n        <svg style={{position:\"absolute\",top:6,right:6,width:32,height:32,transform:\"rotate(-90deg)\"}} viewBox=\"0 0 32 32\">\n          <circle cx=\"16\" cy=\"16\" r=\"13\" fill=\"none\" stroke=\"#ffffff22\" strokeWidth=\"3\"/>\n          <circle cx=\"16\" cy=\"16\" r=\"13\" fill=\"none\"\n            stroke={secs<=5?\"#FF0055\":\"#AA00FF\"} strokeWidth=\"3\"\n            strokeDasharray={`${2*Math.PI*13}`}\n            strokeDashoffset={`${2*Math.PI*13*(1 - secs/20)}`}\n            strokeLinecap=\"round\" style={{transition:\"stroke-dashoffset 1s linear\"}}/>\n        </svg>\n      </div>\n    );\n  }\n\n  // \u2500\u2500 ESTADO: pronto para abrir \u2500\u2500\n  return (\n    <div onClick={isMine ? undefined : open}\n      style={{background: bubbleBg,\n        borderRadius: isMine?\"18px 18px 5px 18px\":\"18px 18px 18px 5px\",\n        padding:\"12px 16px\", display:\"flex\", alignItems:\"center\", gap:10,\n        cursor: isMine?\"default\":\"pointer\",\n        border:`1.5px solid ${isMine?\"transparent\":\"#AA00FF44\"}`,\n        boxShadow: isMine?\"none\":\"0 0 14px #AA00FF22\"}}>\n      {/* thumbnail blur (s\u00f3 quem enviou pode ver a pr\u00e9via) */}\n      <div style={{position:\"relative\", width:48, height:48, borderRadius:10, overflow:\"hidden\", flexShrink:0}}>\n        <img src={msg.img} alt=\"\" style={{width:\"100%\", height:\"100%\", objectFit:\"cover\",\n          filter: isMine ? \"none\" : \"blur(12px) brightness(.4)\"}} />\n        {!isMine && (\n          <div style={{position:\"absolute\",inset:0,display:\"flex\",alignItems:\"center\",\n            justifyContent:\"center\",fontSize:22}}>\ud83d\udc41</div>\n        )}\n      </div>\n      <div>\n        <div style={{fontWeight:700, fontSize:\"clamp(12px,3.5vw,14px)\", color:\"#fff\", marginBottom:2}}>\n          {isMine ? \"Foto \u00fanica enviada\" : \"Foto \u00fanica\"}\n        </div>\n        <div style={{fontSize:\"clamp(10px,2.8vw,12px)\",\n          color: isMine?\"#ffffff88\":\"#AA00FFcc\", fontWeight:600}}>\n          {isMine ? \"\ud83d\udd25 Vis\u00edvel por 20s\" : \"\ud83d\udc46 Toque para ver \u00b7 20s\"}\n        </div>\n      </div>\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 CHAT VIEW \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction ChatView({ user:u, msgs, onBack, onSend, title, subtitle=\"\", nearby=false }) {\n  const [txt,      setTxt]      = useState(\"\");\n  const [local,    setLocal]    = useState([...msgs]);\n  const [mode,     setMode]     = useState(\"text\"); // \"text\" | \"once\"\n  const endRef  = useRef(null);\n  const fileRef = useRef(null);\n\n  useEffect(() => { endRef.current?.scrollIntoView({behavior:\"smooth\"}); }, [local]);\n\n  const send = () => {\n    if (!txt.trim()) return;\n    const m = { from:\"me\", text:txt, id:Date.now() };\n    setLocal(p=>[...p,m]); onSend(m); setTxt(\"\");\n  };\n\n  const sendFile = e => {\n    const f = e.target.files[0];\n    if (!f) return;\n    const url = URL.createObjectURL(f);\n    const m = mode === \"once\"\n      ? { from:\"me\", img:url, id:Date.now(), once:true,  viewed:false } // foto \u00fanica\n      : { from:\"me\", img:url, id:Date.now(), once:false, viewed:false }; // foto normal\n    setLocal(p=>[...p,m]);\n    onSend(m);\n    setMode(\"text\"); // volta ao modo normal ap\u00f3s enviar\n    e.target.value = \"\";\n  };\n\n  const pickPhoto = (asOnce) => {\n    setMode(asOnce ? \"once\" : \"text\");\n    setTimeout(() => fileRef.current?.click(), 50);\n  };\n\n  return (\n    <div style={{display:\"flex\",flexDirection:\"column\",height:\"100%\",width:\"100%\",background:\"#07070f\"}}>\n      <style>{GS}</style>\n\n      {/* Header */}\n      <div style={{display:\"flex\",alignItems:\"center\",gap:10,\n        paddingTop:\"max(env(safe-area-inset-top,0px),12px)\",paddingBottom:12,\n        paddingLeft:12,paddingRight:12,\n        background:\"#07070f\",borderBottom:\"1px solid #ffffff0a\",flexShrink:0}}>\n        <button onClick={onBack} style={{color:\"#ffffffaa\",fontSize:\"clamp(17px,4.5vw,21px)\",marginRight:2,lineHeight:1}}>\u2190</button>\n        <Av init={u.av} size=\"clamp(34px,9.5vw,42px)\" img={u.p1||u.img} online={u.on} />\n        <div style={{flex:1,minWidth:0}}>\n          <div style={{fontWeight:700,fontSize:\"clamp(13px,3.5vw,15px)\",color:\"#fff\",\n            overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\"}}>{title}</div>\n          {subtitle && <div style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#00B4FF\"}}>{subtitle}</div>}\n        </div>\n        {/* indicador de modo foto \u00fanica ativo */}\n        {mode===\"once\" && (\n          <div style={{background:\"#FF005522\",border:\"1.5px solid #FF005544\",borderRadius:8,\n            padding:\"4px 9px\",display:\"flex\",alignItems:\"center\",gap:5}}>\n            <span style={{fontSize:12}}>\ud83d\udd25</span>\n            <span style={{fontSize:\"clamp(9px,2.4vw,11px)\",color:\"#FF0055\",fontWeight:700,fontFamily:\"'Orbitron',monospace\"}}>\u00daNICA</span>\n          </div>\n        )}\n      </div>\n\n      {/* Messages */}\n      <div style={{flex:1,overflowY:\"auto\",padding:\"clamp(10px,3vw,14px)\",\n        display:\"flex\",flexDirection:\"column\",gap:\"clamp(7px,2.5vw,10px)\",\n        WebkitOverflowScrolling:\"touch\"}}>\n        {local.length===0 && (\n          <div style={{textAlign:\"center\",color:\"#ffffff44\",fontSize:\"clamp(12px,3.5vw,14px)\",marginTop:44}}>\n            Diga oi! \ud83d\udc4b\n          </div>\n        )}\n        {local.map(m=>(\n          <div key={m.id} style={{display:\"flex\",justifyContent:m.from===\"me\"?\"flex-end\":\"flex-start\"}}>\n            {/* foto \u00fanica */}\n            {m.once\n              ? <OncePhoto msg={m} isMine={m.from===\"me\"} />\n              /* foto normal */\n              : m.img\n                ? <div style={{maxWidth:\"min(220px,65vw)\",borderRadius:m.from===\"me\"?\"18px 18px 5px 18px\":\"18px 18px 18px 5px\",overflow:\"hidden\"}}>\n                    <img src={m.img} alt=\"foto\" style={{width:\"100%\",display:\"block\"}} />\n                  </div>\n                /* texto */\n                : <div style={{maxWidth:\"74%\",borderRadius:m.from===\"me\"?\"18px 18px 5px 18px\":\"18px 18px 18px 5px\",\n                    background:m.from===\"me\"?\"linear-gradient(135deg,#AA00FF,#FF0055)\":\"#ffffff0f\",\n                    padding:\"clamp(8px,2.5vw,11px) clamp(11px,3vw,14px)\",\n                    fontSize:\"clamp(12px,3.5vw,14px)\"}}>\n                    {m.text}\n                  </div>\n            }\n          </div>\n        ))}\n        <div ref={endRef} />\n      </div>\n\n      {/* Input bar */}\n      <div style={{padding:\"clamp(9px,2.5vw,12px) 12px\",\n        paddingBottom:\"calc(clamp(10px,3vw,14px) + env(safe-area-inset-bottom,0px))\",\n        background:\"#0c0c1a\",borderTop:\"1px solid #ffffff0a\",\n        display:\"flex\",gap:\"clamp(6px,2vw,9px)\",alignItems:\"center\",flexShrink:0}}>\n\n        {/* hidden file input */}\n        <input ref={fileRef} type=\"file\" accept=\"image/*\" style={{display:\"none\"}} onChange={sendFile} />\n\n        {/* foto normal */}\n        <button onClick={()=>pickPhoto(false)}\n          style={{color:\"#ffffff88\",fontSize:\"clamp(19px,5vw,23px)\",lineHeight:1,flexShrink:0,\n            padding:\"2px\",borderRadius:8,transition:\"all .2s\"}}>\ud83d\udcf7</button>\n\n        {/* foto \u00fanica \ud83d\udd25 */}\n        <button onClick={()=>pickPhoto(true)}\n          title=\"Foto de visualiza\u00e7\u00e3o \u00fanica (20s)\"\n          style={{color: mode===\"once\"?\"#FF0055\":\"#ffffff55\",\n            fontSize:\"clamp(19px,5vw,23px)\",lineHeight:1,flexShrink:0,\n            padding:\"2px\",borderRadius:8,transition:\"all .2s\",\n            filter: mode===\"once\"?\"drop-shadow(0 0 6px #FF0055)\":\"none\"}}>\ud83d\udd25</button>\n\n        {/* campo de texto */}\n        <input value={txt} onChange={e=>setTxt(e.target.value)}\n          onKeyDown={e=>e.key===\"Enter\"&&send()} placeholder=\"Mensagem\u2026\"\n          style={{flex:1,background:\"#ffffff0d\",border:`1.5px solid ${mode===\"once\"?\"#FF005544\":\"#ffffff18\"}`,\n            borderRadius:22,padding:\"clamp(9px,2.5vw,12px) clamp(13px,3.5vw,16px)\",\n            color:\"#fff\",fontSize:\"clamp(13px,3.5vw,15px)\",transition:\"border-color .2s\"}} />\n\n        {/* enviar */}\n        <button onClick={send}\n          style={{background:\"linear-gradient(135deg,#AA00FF,#FF0055)\",borderRadius:\"50%\",\n            width:\"clamp(36px,9vw,44px)\",height:\"clamp(36px,9vw,44px)\",display:\"flex\",alignItems:\"center\",\n            justifyContent:\"center\",fontSize:\"clamp(15px,4vw,19px)\",\n            boxShadow:\"0 0 14px #AA00FF55\",flexShrink:0}}>\u2191</button>\n      </div>\n    </div>\n  );\n}\n";
var P3="// \u2550\u2550\u2550 BOTTOM NAV \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction BotNav({ tab, setTab, onPost, tixCount }) {\n  const LEFT  = [[\"feed\",\"\ud83c\udfe0\",\"FEED\"],[\"flirt\",\"\ud83d\udd25\",\"FLERTE\"],[\"tickets\",\"\ud83c\udfab\",\"EVENTOS\"]];\n  const RIGHT = [[\"mytickets\",\"\ud83c\udf9f\ufe0f\",\"INGRESSOS\"],[\"profile\",\"\ud83d\udc64\",\"PERFIL\"]];\n\n  const activeColor = (id) => {\n    if (id===\"flirt\") return \"#FF0055\";\n    return \"#AA00FF\";\n  };\n\n  const Item = ({id,ic,lb,badge=0}) => (\n    <button onClick={()=>setTab(id)}\n      style={{flex:1,display:\"flex\",flexDirection:\"column\",alignItems:\"center\",gap:\"clamp(2px,1vw,4px)\",\n        position:\"relative\",padding:\"4px 0\",\n        color: tab===id ? \"#fff\" : \"#ffffffbb\",\n        filter: tab===id ? `drop-shadow(0 0 8px ${activeColor(id)}) brightness(1.25)` : \"none\",\n        transition:\"all .22s\"}}>\n      <span style={{fontSize:\"clamp(19px,5.5vw,24px)\",lineHeight:1}}>{ic}</span>\n      <span style={{fontSize:\"clamp(8px,2.2vw,10px)\",fontFamily:\"'Orbitron',monospace\",letterSpacing:.5,\n        fontWeight: tab===id?700:600,\n        color: tab===id ? \"#fff\" : \"#ffffffcc\",\n        textShadow: tab===id ? `0 0 10px ${activeColor(id)}99` : \"none\"}}>\n        {lb}\n      </span>\n      {badge>0 && (\n        <div style={{position:\"absolute\",top:0,right:\"clamp(4px,2vw,10px)\",background:\"#FF0055\",borderRadius:\"50%\",\n          width:\"clamp(14px,4vw,18px)\",height:\"clamp(14px,4vw,18px)\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",\n          fontSize:\"clamp(8px,2.2vw,10px)\",fontWeight:700,boxShadow:\"0 0 8px #FF005577\"}}>\n          {badge}\n        </div>\n      )}\n    </button>\n  );\n\n  return (\n    <div style={{flexShrink:0,\n      background:\"linear-gradient(180deg,#0c0c1e 0%,#07070f 100%)\",\n      borderTop:\"1.5px solid #ffffff18\",\n      boxShadow:\"0 -6px 40px #00000099, inset 0 1px 0 #ffffff0f\",\n      display:\"flex\",alignItems:\"center\",\n      paddingTop:\"clamp(8px,2.5vw,11px)\",\n      paddingBottom:\"calc(clamp(10px,3vw,14px) + env(safe-area-inset-bottom,0px))\",\n      position:\"relative\",   /* permite z-index */\n      zIndex:90,             /* acima do conte\u00fado */\n      width:\"100%\",\n      overflow:\"visible\"}}> {/* permite bot\u00e3o + subir sem ser cortado */}\n      {LEFT.map(([id,ic,lb])=><Item key={id} id={id} ic={ic} lb={lb} />)}\n      {/* Center post button \u2014 sobe acima da barra */}\n      <div style={{flex:\"0 0 clamp(54px,15vw,66px)\",display:\"flex\",justifyContent:\"center\",\n        position:\"relative\",zIndex:91}}>\n        <button onClick={onPost}\n          style={{width:\"clamp(50px,13.5vw,62px)\",height:\"clamp(50px,13.5vw,62px)\",borderRadius:\"50%\",\n            background:`linear-gradient(135deg,#AA00FF,#FF0055)`,\n            border:\"3px solid #07070f\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",\n            fontSize:\"clamp(24px,7vw,30px)\",lineHeight:1,color:\"#fff\",\n            boxShadow:\"0 0 28px #AA00FF99,0 4px 22px #FF005566\",\n            position:\"absolute\",                    /* sai do fluxo normal */\n            bottom:\"calc(100% - 22px)\",             /* sobe acima da barra */\n            left:\"50%\",transform:\"translateX(-50%)\",/* centraliza horizontalmente */\n            zIndex:92,\n            transition:\"all .22s\"}}>\uff0b</button>\n        {/* espa\u00e7o vazio para manter o flex gap correto */}\n        <div style={{width:\"clamp(50px,13.5vw,62px)\",height:\"clamp(50px,13.5vw,62px)\",opacity:0,pointerEvents:\"none\"}}/>\n      </div>\n      {RIGHT.map(([id,ic,lb])=><Item key={id} id={id} ic={ic} lb={lb} badge={id===\"mytickets\"?tixCount:0} />)}\n    </div>\n  );\n}\n\n\n// \u2550\u2550\u2550 STORY MODAL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction StoryMod({ user, onClose }) {\n  const [prog,setProg]=useState(0);\n  useEffect(()=>{\n    const t=setInterval(()=>setProg(p=>{if(p>=100){clearInterval(t);onClose();return 100;}return p+1.4;}),50);\n    return()=>clearInterval(t);\n  },[]);\n\n  const link = user.link || null;\n\n  return (\n    <div style={{position:\"fixed\",inset:0,background:\"#000\",zIndex:200,display:\"flex\",flexDirection:\"column\"}}>\n      {/* Progress */}\n      <div style={{height:3,background:\"#ffffff1a\",margin:\"max(env(safe-area-inset-top,0px),40px) 12px 0\"}}>\n        <div style={{height:\"100%\",width:`${prog}%`,background:`linear-gradient(90deg,${RAINBOW.join(\",\")})`,transition:\"width .05s linear\"}} />\n      </div>\n      {/* Header */}\n      <div style={{display:\"flex\",alignItems:\"center\",gap:9,padding:\"11px 13px\"}}>\n        <Av init={user.av} size={36} img={user.img} />\n        <span style={{fontWeight:700,fontSize:\"clamp(13px,3.5vw,15px)\",color:\"#fff\",flex:1}}>{user.usr}</span>\n        <button onClick={onClose} style={{color:\"#ffffffaa\",fontSize:22,lineHeight:1,padding:\"2px 6px\"}}>\u2715</button>\n      </div>\n      {/* Media \u2014 tap to close */}\n      <div style={{flex:1,position:\"relative\",overflow:\"hidden\"}} onClick={onClose}>\n        {user.img\n          ? <img src={user.img} alt=\"\" style={{width:\"100%\",height:\"100%\",objectFit:\"cover\"}} onError={e=>e.target.style.display=\"none\"} />\n          : <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"center\",height:\"100%\",fontSize:80}}>\ud83c\udf08</div>\n        }\n        {/* Caption */}\n        {user.caption && (\n          <div style={{position:\"absolute\",bottom:link?76:20,left:0,right:0,textAlign:\"center\",padding:\"0 20px\",pointerEvents:\"none\"}}>\n            <div style={{display:\"inline-block\",background:\"#000000cc\",backdropFilter:\"blur(8px)\",\n              borderRadius:12,padding:\"8px 16px\",fontSize:\"clamp(13px,3.5vw,15px)\",color:\"#fff\",lineHeight:1.5,maxWidth:\"90%\"}}>\n              {user.caption}\n            </div>\n          </div>\n        )}\n      </div>\n      {/* Link button \u2014 estilo Instagram */}\n      {link && (\n        <div style={{flexShrink:0,paddingBottom:\"calc(16px + env(safe-area-inset-bottom,0px))\",\n          padding:\"12px 20px calc(16px + env(safe-area-inset-bottom,0px))\",\n          background:\"linear-gradient(transparent,#000000cc)\",display:\"flex\",justifyContent:\"center\"}}>\n          <a href={link} target=\"_blank\" rel=\"noopener noreferrer\"\n            onClick={e=>e.stopPropagation()}\n            style={{display:\"flex\",alignItems:\"center\",gap:9,background:\"#ffffffee\",borderRadius:30,\n              padding:\"clamp(11px,3vw,13px) clamp(20px,5.5vw,28px)\",color:\"#07070f\",fontWeight:700,\n              textDecoration:\"none\",fontSize:\"clamp(13px,3.5vw,15px)\",boxShadow:\"0 4px 20px #00000055\",\n              maxWidth:300,overflow:\"hidden\"}}>\n            <span style={{fontSize:18}}>\ud83d\udd17</span>\n            <span style={{overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\"}}>\n              {link.replace(/^https?:\\/\\//,\"\").slice(0,30)}\n            </span>\n            <span style={{fontSize:16,flexShrink:0}}>\u203a</span>\n          </a>\n        </div>\n      )}\n    </div>\n  );\n}\n\n\n// \u2550\u2550\u2550 TICKET / PAYMENT MODAL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction TicketMod({ t, onClose, onBuy }) {\n  const [step,setStep]=useState(0);\n  const [pay,setPay]=useState(\"pix\");\n  const [proc,setProc]=useState(false);\n  const [cn,setCn]=useState(\"\");const [cname,setCname]=useState(\"\");const [exp,setExp]=useState(\"\");const [cvv,setCvv]=useState(\"\");\n  const commission = t.pn>0 ? +(t.pn*.15).toFixed(2) : 0;\n\n  const doPay = async () => {\n    setProc(true);\n    try {\n      await onBuy(t, pay, {cn,cname,exp,cvv});\n      setStep(2);\n    } catch(e) {\n      alert(\"Erro no pagamento. Tente novamente.\");\n    } finally { setProc(false); }\n  };\n\n  return (\n    <Sheet onClose={()=>!proc&&onClose()} title=\"\">\n      {/* STEP 0: Event details */}\n      {step===0 && (\n        <>\n          <div style={{textAlign:\"center\",marginBottom:16}}>\n            <div style={{fontSize:\"clamp(36px,10vw,46px)\",marginBottom:8}}>{t.ico||\"\ud83c\udfab\"}</div>\n            <h3 style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(14px,4vw,17px)\",marginBottom:3,color:\"#fff\"}}>{t.event}</h3>\n            <p style={{color:\"#ffffff77\",fontSize:\"clamp(11px,3vw,13px)\"}}>\ud83d\udcc5 {t.date} \u00b7 \u23f0 {t.time} \u00b7 \ud83d\udccd {t.venue}</p>\n          </div>\n          {/* Price breakdown */}\n          <div style={{background:\"#ffffff07\",borderRadius:12,padding:14,marginBottom:14}}>\n            {[[\"Ingresso\",t.price,\"#ffffffcc\"],\n              [\"Taxa plataforma (15%)\",t.pn>0?`-R$${commission.toFixed(2)}`:\"\u2014\",\"#FF6B00\"],\n              [\"Total\",t.price,\"#FFD700\"]].map(([k,v,c],i)=>(\n              <div key={k} style={{display:\"flex\",justifyContent:\"space-between\",padding:\"6px 0\",borderTop:i>0?\"1px solid #ffffff0a\":\"none\"}}>\n                <span style={{color:\"#ffffff88\",fontSize:\"clamp(11px,3vw,13px)\"}}>{k}</span>\n                <span style={{fontWeight:i===2?700:400,color:c,fontSize:i===2?\"clamp(14px,4vw,16px)\":\"clamp(11px,3vw,13px)\"}}>{v}</span>\n              </div>\n            ))}\n          </div>\n          {t.pn>0\n            ? <Btn onClick={()=>setStep(1)} color=\"#FFD700\" style={{width:\"100%\"}}>ESCOLHER PAGAMENTO \ud83d\udcb3</Btn>\n            : <Btn onClick={doPay} color=\"#00E676\" style={{width:\"100%\",color:\"#000\"}}>GARANTIR GRATUITO \u2713</Btn>\n          }\n        </>\n      )}\n\n      {/* STEP 1: Payment method */}\n      {step===1 && (\n        <>\n          <p style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(11px,3vw,13px)\",letterSpacing:1,marginBottom:14,color:\"#fff\"}}>\ud83d\udcb3 FORMA DE PAGAMENTO</p>\n          <div style={{display:\"flex\",gap:5,marginBottom:16,flexWrap:\"wrap\"}}>\n            {[[\"pix\",\"PIX \ud83d\udfe2\"],[\"credit\",\"Cr\u00e9dito\"],[\"debit\",\"D\u00e9bito\"],[\"boleto\",\"Boleto\"]].map(([k,l])=>(\n              <button key={k} onClick={()=>setPay(k)} style={{flex:1,minWidth:\"clamp(55px,15vw,70px)\",\n                background:pay===k?\"linear-gradient(135deg,#AA00FF,#FF0055)\":\"#ffffff0a\",\n                border:`1.5px solid ${pay===k?\"#AA00FF55\":\"#ffffff15\"}`,borderRadius:9,\n                padding:\"clamp(7px,2.5vw,9px) 4px\",color:\"#fff\",fontSize:\"clamp(10px,2.8vw,12px)\",fontWeight:pay===k?700:400}}>\n                {l}\n              </button>\n            ))}\n          </div>\n\n          {/* PIX */}\n          {pay===\"pix\" && (\n            <div style={{background:\"#00E67609\",border:\"1.5px solid #00E67622\",borderRadius:13,padding:\"clamp(14px,4vw,20px)\",textAlign:\"center\",marginBottom:14}}>\n              <div style={{fontSize:\"clamp(48px,13vw,66px)\",marginBottom:10,filter:\"drop-shadow(0 0 16px #00E67655)\"}}>\ud83d\udcf1</div>\n              <div style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(9px,2.5vw,12px)\",color:\"#00E676\",marginBottom:8}}>PIX COPIA E COLA</div>\n              <div style={{background:\"#00E67610\",border:\"1.5px solid #00E67630\",borderRadius:8,padding:\"9px 13px\",\n                fontFamily:\"monospace\",fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#00E676\",wordBreak:\"break-all\",marginBottom:9}}>\n                00020126360014br.gov.bcb.pix0114CSQ-{Date.now().toString().slice(-8)}52040000530398654{t.pn.toFixed(2)}5802BR5911CENASQUARE6008BRASILIA62070503***6304XXXX\n              </div>\n              <button style={{background:\"#00E67618\",border:\"1.5px solid #00E67633\",borderRadius:7,padding:\"7px 14px\",color:\"#00E676\",fontSize:\"clamp(11px,3vw,13px)\"}}>\ud83d\udccb Copiar c\u00f3digo PIX</button>\n              <p style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff44\",marginTop:8}}>V\u00e1lido por 30 minutos \u00b7 Processado via Mercado Pago</p>\n            </div>\n          )}\n\n          {/* Card */}\n          {(pay===\"credit\"||pay===\"debit\") && (\n            <div style={{display:\"flex\",flexDirection:\"column\",gap:9,marginBottom:14}}>\n              <input value={cn} onChange={e=>setCn(e.target.value.replace(/\\D/g,\"\").slice(0,16))} placeholder=\"N\u00famero do cart\u00e3o\" inputMode=\"numeric\"\n                style={{background:\"#ffffff0d\",border:\"1.5px solid #ffffff18\",borderRadius:11,padding:\"clamp(11px,3vw,13px) 14px\",color:\"#fff\",fontSize:\"clamp(13px,3.5vw,15px)\",letterSpacing:2}} />\n              <input value={cname} onChange={e=>setCname(e.target.value)} placeholder=\"Nome no cart\u00e3o\" autoCapitalize=\"characters\"\n                style={{background:\"#ffffff0d\",border:\"1.5px solid #ffffff18\",borderRadius:11,padding:\"clamp(11px,3vw,13px) 14px\",color:\"#fff\",fontSize:\"clamp(13px,3.5vw,15px)\"}} />\n              <div style={{display:\"flex\",gap:9}}>\n                <input value={exp} onChange={e=>setExp(e.target.value)} placeholder=\"MM/AA\" inputMode=\"numeric\"\n                  style={{flex:1,background:\"#ffffff0d\",border:\"1.5px solid #ffffff18\",borderRadius:11,padding:\"clamp(11px,3vw,13px) 14px\",color:\"#fff\",fontSize:\"clamp(13px,3.5vw,15px)\"}} />\n                <input value={cvv} onChange={e=>setCvv(e.target.value.slice(0,4))} placeholder=\"CVV\" inputMode=\"numeric\" type=\"password\"\n                  style={{flex:1,background:\"#ffffff0d\",border:\"1.5px solid #ffffff18\",borderRadius:11,padding:\"clamp(11px,3vw,13px) 14px\",color:\"#fff\",fontSize:\"clamp(13px,3.5vw,15px)\"}} />\n              </div>\n              {pay===\"credit\" && (\n                <div style={{background:\"#AA00FF09\",border:\"1.5px solid #AA00FF1a\",borderRadius:10,padding:\"11px 13px\"}}>\n                  <p style={{fontSize:\"clamp(10px,3vw,12px)\",color:\"#ffffffaa\",marginBottom:7,fontWeight:600}}>Parcelamento sem juros:</p>\n                  {[`1x ${t.price}`,`2x R$${(t.pn/2).toFixed(2).replace(\".\",\",\")}`,`3x R$${(t.pn/3).toFixed(2).replace(\".\",\",\")}`].map(o=>(\n                    <label key={o} style={{display:\"flex\",alignItems:\"center\",gap:8,fontSize:\"clamp(11px,3vw,13px)\",color:\"#ffffffcc\",padding:\"4px 0\",cursor:\"pointer\"}}>\n                      <input type=\"radio\" name=\"parc\" style={{accentColor:\"#AA00FF\"}} /> {o}\n                    </label>\n                  ))}\n                </div>\n              )}\n            </div>\n          )}\n\n          {/* Boleto */}\n          {pay===\"boleto\" && (\n            <div style={{background:\"#ffffff07\",border:\"1.5px solid #ffffff0f\",borderRadius:13,padding:\"clamp(14px,4vw,18px)\",textAlign:\"center\",marginBottom:14}}>\n              <div style={{fontSize:\"clamp(38px,11vw,52px)\",marginBottom:9}}>\ud83e\uddfe</div>\n              <p style={{fontSize:\"clamp(13px,3.5vw,15px)\",color:\"#ffffffcc\",marginBottom:5}}>Boleto banc\u00e1rio</p>\n              <p style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffff55\"}}>Vence em 3 dias \u00fateis \u00b7 Processado via Mercado Pago</p>\n            </div>\n          )}\n\n          <Btn onClick={doPay} color=\"#AA00FF\" style={{width:\"100%\"}} disabled={proc}>\n            {proc?\"\u23f3 Processando...\":\"PAGAR \"+t.price+\" \ud83d\udd12\"}\n          </Btn>\n          <button onClick={()=>setStep(0)} style={{width:\"100%\",color:\"#ffffff66\",fontSize:\"clamp(11px,3vw,13px)\",marginTop:10,padding:6}}>\u2190 voltar</button>\n        </>\n      )}\n\n      {/* STEP 2: Success */}\n      {step===2 && (\n        <div style={{textAlign:\"center\",padding:\"16px 0\"}}>\n          <div style={{fontSize:\"clamp(44px,12vw,58px)\",marginBottom:12,filter:\"drop-shadow(0 0 20px #00E67677)\"}}>\u2705</div>\n          <h3 style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(14px,4vw,17px)\",marginBottom:7,color:\"#00E676\"}}>Ingresso Garantido!</h3>\n          <p style={{color:\"#ffffff77\",fontSize:\"clamp(11px,3vw,13px)\",marginBottom:4}}>{t.event}</p>\n          <p style={{color:\"#ffffff55\",fontSize:\"clamp(10px,2.8vw,12px)\",marginBottom:16}}>\ud83d\udce7 Confirma\u00e7\u00e3o enviada por email</p>\n          <div style={{display:\"flex\",gap:8,justifyContent:\"center\",marginBottom:14,flexWrap:\"wrap\"}}>\n            <div style={{padding:\"7px 14px\",background:\"#00E67611\",border:\"1.5px solid #00E67633\",borderRadius:8,fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#00E676\"}}>\ud83c\udf9f\ufe0f Em Meus Ingressos</div>\n            <div style={{padding:\"7px 14px\",background:\"#00B4FF11\",border:\"1.5px solid #00B4FF33\",borderRadius:8,fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#00B4FF\"}}>\ud83d\udce7 Email enviado</div>\n          </div>\n          <button onClick={onClose} style={{background:\"#ffffff0a\",border:\"1.5px solid #ffffff15\",borderRadius:11,padding:\"11px 26px\",color:\"#ffffffcc\",fontSize:\"clamp(12px,3.5vw,14px)\"}}>Fechar</button>\n        </div>\n      )}\n    </Sheet>\n  );\n}\n\n// \u2550\u2550\u2550 NEW POST MODAL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction NewPostMod({ onClose, onPost, me }) {\n  const [cap,    setCap]    = useState(\"\");\n  const [isT,    setIsT]    = useState(false);\n  const [isEv,   setIsEv]   = useState(false);\n  const [imgs,   setImgs]   = useState([]);     // array de URLs (carrossel)\n  const [selIdx, setSelIdx] = useState(0);      // imagem selecionada no preview\n  const fileRef = useRef(null);\n\n  const pick = e => {\n    const files = Array.from(e.target.files);\n    if (!files.length) return;\n    const newUrls = files.map(f => URL.createObjectURL(f));\n    setImgs(prev => {\n      const merged = [...prev, ...newUrls].slice(0, 10); // m\u00e1x 10\n      setSelIdx(merged.length - 1);\n      return merged;\n    });\n    e.target.value = \"\"; // permite selecionar os mesmos arquivos novamente\n  };\n\n  const removeImg = idx => {\n    setImgs(prev => {\n      const next = prev.filter((_,i)=>i!==idx);\n      setSelIdx(Math.min(selIdx, next.length-1));\n      return next;\n    });\n  };\n\n  const post = () => {\n    onPost({\n      id:       Date.now(),\n      uid:      me?.username || \"voc\u00ea\",\n      usr:      me?.username || \"voc\u00ea\",\n      av:       me?.av  || \"EU\",\n      ai:       me?.img || null,\n      img:      imgs[0] || UP.party[Math.floor(Math.random()*UP.party.length)],\n      imgs:     imgs.length > 0 ? imgs : null,   // carrossel\n      lk:0, cm:0, comments:[],\n      cap:      cap || \"\ud83c\udf08\",\n      T:isT, W:isT,\n      ev: isEv && (me?.role === \"admin\"),\n      tk:null, tm:\"agora\", fl:false, bl:false, ok:true\n    });\n    onClose();\n  };\n\n  return (\n    <Sheet onClose={onClose} title=\"NOVA PUBLICA\u00c7\u00c3O\">\n      {me?.role===\"admin\" && (\n        <div style={{padding:\"6px 12px 8px\",background:\"#AA00FF0d\",border:\"1.5px solid #AA00FF1a\",borderRadius:9,marginBottom:12,display:\"flex\",gap:7,alignItems:\"center\"}}>\n          <span style={{fontSize:14}}>\u26a1</span>\n          <span style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#AA00FFCC\"}}>Administradores podem publicar eventos e ingressos.</span>\n        </div>\n      )}\n\n      {/* Hidden file input \u2014 multiple */}\n      <input ref={fileRef} type=\"file\" accept=\"image/*,video/*\" multiple style={{display:\"none\"}} onChange={pick} />\n\n      {/* Preview + thumbnails */}\n      {imgs.length === 0 ? (\n        <div onClick={()=>fileRef.current?.click()}\n          style={{background:\"#ffffff07\",borderRadius:13,height:150,marginBottom:12,\n            border:\"2px dashed #ffffff18\",cursor:\"pointer\",overflow:\"hidden\",\n            display:\"flex\",flexDirection:\"column\",alignItems:\"center\",justifyContent:\"center\",gap:8}}>\n          <span style={{fontSize:\"clamp(26px,7vw,34px)\"}}>\ud83d\udcf8</span>\n          <span style={{color:\"#ffffff55\",fontSize:\"clamp(12px,3.5vw,14px)\"}}>Selecionar fotos / v\u00eddeo</span>\n          <span style={{color:\"#ffffff33\",fontSize:\"clamp(9px,2.5vw,11px)\"}}>At\u00e9 10 imagens \u00b7 carrossel autom\u00e1tico</span>\n        </div>\n      ) : (\n        <div style={{marginBottom:12}}>\n          {/* Imagem principal selecionada */}\n          <div style={{borderRadius:13,overflow:\"hidden\",aspectRatio:\"1\",marginBottom:8,position:\"relative\"}}>\n            <img src={imgs[selIdx]} alt=\"\" style={{width:\"100%\",height:\"100%\",objectFit:\"cover\",display:\"block\"}} />\n            {imgs.length > 1 && (\n              <div style={{position:\"absolute\",top:8,right:8,background:\"#000000bb\",backdropFilter:\"blur(8px)\",\n                borderRadius:20,padding:\"4px 10px\",fontFamily:\"'Orbitron',monospace\",\n                fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#fff\",fontWeight:700}}>\n                {selIdx+1}/{imgs.length}\n              </div>\n            )}\n          </div>\n          {/* Linha de thumbnails */}\n          <div style={{display:\"flex\",gap:6,overflowX:\"auto\",scrollbarWidth:\"none\",paddingBottom:2}}>\n            {imgs.map((src,i)=>(\n              <div key={i} style={{position:\"relative\",flexShrink:0,\n                width:\"clamp(52px,14vw,64px)\",height:\"clamp(52px,14vw,64px)\",borderRadius:9,overflow:\"hidden\",\n                border:`2px solid ${i===selIdx?\"#AA00FF\":\"#ffffff18\"}`,cursor:\"pointer\"}}\n                onClick={()=>setSelIdx(i)}>\n                <img src={src} alt=\"\" style={{width:\"100%\",height:\"100%\",objectFit:\"cover\"}} />\n                <button onClick={e=>{e.stopPropagation();removeImg(i);}}\n                  style={{position:\"absolute\",top:2,right:2,background:\"#000000cc\",borderRadius:\"50%\",\n                    width:18,height:18,display:\"flex\",alignItems:\"center\",justifyContent:\"center\",\n                    color:\"#fff\",fontSize:11,lineHeight:1}}>\u2715</button>\n              </div>\n            ))}\n            {/* Bot\u00e3o adicionar mais */}\n            {imgs.length < 10 && (\n              <div onClick={()=>fileRef.current?.click()}\n                style={{flexShrink:0,width:\"clamp(52px,14vw,64px)\",height:\"clamp(52px,14vw,64px)\",\n                  borderRadius:9,border:\"2px dashed #ffffff22\",cursor:\"pointer\",\n                  display:\"flex\",alignItems:\"center\",justifyContent:\"center\",\n                  color:\"#ffffff55\",fontSize:\"clamp(18px,5vw,22px)\"}}>+</div>\n            )}\n          </div>\n        </div>\n      )}\n\n      <textarea value={cap} onChange={e=>setCap(e.target.value)} placeholder=\"Escreva uma legenda\u2026\"\n        style={{width:\"100%\",background:\"#ffffff0d\",border:\"1.5px solid #ffffff18\",borderRadius:11,\n          padding:11,color:\"#fff\",fontSize:\"clamp(12px,3.5vw,14px)\",minHeight:60,resize:\"none\",marginBottom:12}} />\n\n      <div style={{display:\"flex\",gap:16,marginBottom:14}}>\n        {[[\"isT\",\"\ud83d\udd1e T18+\",\"#FF0055\",isT,setIsT],...(me?.role===\"admin\"?[[\"isEv\",\"\ud83c\udfab Evento\",\"#FFD700\",isEv,setIsEv]]:[])]\n          .map(([k,lb,c,val,setter])=>(\n          <label key={k} style={{display:\"flex\",alignItems:\"center\",gap:8,cursor:\"pointer\"}}>\n            <input type=\"checkbox\" checked={val} onChange={e=>setter(e.target.checked)} style={{accentColor:c,width:17,height:17}} />\n            <span style={{fontSize:\"clamp(12px,3.5vw,14px)\",color:val?c:\"#ffffffaa\",fontWeight:val?700:400}}>{lb}</span>\n          </label>\n        ))}\n      </div>\n\n      <Btn onClick={post} color=\"#AA00FF\" style={{width:\"100%\"}} disabled={imgs.length===0}>\n        {imgs.length===0 ? \"Selecione uma foto primeiro\" : `PUBLICAR${imgs.length>1?\" (\"+imgs.length+\" fotos)\":\"\"} \ud83d\ude80`}\n      </Btn>\n    </Sheet>\n  );\n}\n\n// \u2550\u2550\u2550 NEARBY PROFILE MODAL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction NearbyPMod({ user:u, onClose, onChat, onLike }) {\n  return (\n    <div style={{position:\"fixed\",inset:0,background:\"#000000cc\",zIndex:200,display:\"flex\",alignItems:\"flex-end\"}} onClick={onClose}>\n      <div onClick={e=>e.stopPropagation()} className=\"fu\"\n        style={{background:\"#0e0e1e\",borderRadius:\"22px 22px 0 0\",width:\"100%\",maxWidth:480,margin:\"0 auto\",border:\"1.5px solid #ffffff0a\",overflow:\"hidden\"}}>\n        <div style={{position:\"relative\"}}>\n          <img src={u.p2} alt=\"\" style={{width:\"100%\",aspectRatio:\"4/3\",objectFit:\"cover\"}} onError={e=>{e.target.src=u.p1;}} />\n          <button onClick={onClose} style={{position:\"absolute\",top:12,right:12,background:\"#00000099\",borderRadius:\"50%\",width:33,height:33,color:\"#fff\",fontSize:15,display:\"flex\",alignItems:\"center\",justifyContent:\"center\"}}>\u2715</button>\n          <div style={{position:\"absolute\",top:12,left:12,background:\"#000000bb\",backdropFilter:\"blur(10px)\",borderRadius:10,padding:\"5px 12px\",display:\"flex\",alignItems:\"center\",gap:5}}>\n            <span style={{fontSize:12}}>\ud83d\udccd</span>\n            <span style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(12px,3.5vw,14px)\",fontWeight:700,color:\"#00B4FF\"}}>{u.dist} de voc\u00ea</span>\n          </div>\n          <div style={{position:\"absolute\",bottom:0,left:0,right:0,background:\"linear-gradient(transparent,#0e0e1e)\",padding:\"clamp(30px,8vw,44px) 16px 13px\"}}>\n            <div style={{fontWeight:900,fontSize:\"clamp(17px,5vw,22px)\",color:\"#fff\"}}>{u.sn}</div>\n            <div style={{fontSize:\"clamp(11px,3.2vw,14px)\",color:\"#ffffffaa\"}}>{u.age} anos \u00b7 {u.on?<span style={{color:\"#00E676\"}}>\ud83d\udfe2 Online</span>:<span style={{color:\"#ffffff44\"}}>\u26ab Offline</span>}</div>\n          </div>\n        </div>\n        <div style={{padding:\"clamp(13px,4vw,17px) clamp(14px,4vw,18px) clamp(18px,5vw,24px)\"}}>\n          <p style={{color:\"#ffffffcc\",fontSize:\"clamp(12px,3.5vw,14px)\",marginBottom:10,lineHeight:1.5}}>{u.bio}</p>\n          <div style={{display:\"flex\",gap:9}}>\n            <button onClick={onLike} style={{background:u.lk?\"#FF005518\":\"#ffffff0a\",border:`1.5px solid ${u.lk?\"#FF005544\":\"#ffffff13\"}`,borderRadius:12,padding:\"clamp(10px,3vw,13px) clamp(13px,3.5vw,17px)\",color:u.lk?\"#FF0055\":\"#ffffff88\",fontSize:\"clamp(18px,5vw,22px)\",transition:\"all .2s\"}}>\n              {u.lk?\"\u2764\ufe0f\":\"\ud83e\udd0d\"}\n            </button>\n            <Btn onClick={onChat} color=\"#AA00FF\" style={{flex:1,fontSize:\"clamp(12px,3.5vw,14px)\"}}>\ud83d\udcac Enviar mensagem</Btn>\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 ADMIN MODAL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction AdminMod({ posts, onFlag, onBlock, onClose }) {\n  const [at,setAt]=useState(\"posts\");\n  return (\n    <Sheet onClose={onClose} title=\"\u26a1 PAINEL ADMIN\">\n      <div style={{display:\"flex\",gap:6,marginBottom:14}}>\n        {[\"posts\",\"usu\u00e1rios\"].map(t=>(\n          <button key={t} onClick={()=>setAt(t)} style={{flex:1,background:at===t?\"#FFD70018\":\"#ffffff07\",border:`1.5px solid ${at===t?\"#FFD70033\":\"#ffffff0a\"}`,borderRadius:8,padding:\"8px\",color:at===t?\"#FFD700\":\"#ffffff66\",fontSize:\"clamp(9px,2.5vw,11px)\",fontFamily:\"'Orbitron',monospace\"}}>\n            {t.toUpperCase()}\n          </button>\n        ))}\n        <div style={{background:\"#FF005512\",borderRadius:8,padding:\"8px 12px\",color:\"#FF0055\",fontSize:\"clamp(9px,2.5vw,11px)\",fontFamily:\"'Orbitron',monospace\",display:\"flex\",alignItems:\"center\"}}>\n          {posts.filter(p=>p.fl).length} \ud83d\udea8\n        </div>\n      </div>\n      {at===\"posts\" && posts.map(p=>(\n        <div key={p.id} style={{display:\"flex\",alignItems:\"center\",gap:9,padding:\"10px 0\",borderBottom:\"1px solid #ffffff08\"}}>\n          <img src={p.img} alt=\"\" style={{width:\"clamp(38px,10vw,46px)\",height:\"clamp(38px,10vw,46px)\",borderRadius:8,objectFit:\"cover\",flexShrink:0}} onError={e=>e.target.style.display=\"none\"} />\n          <div style={{flex:1,minWidth:0}}>\n            <div style={{fontSize:\"clamp(12px,3.5vw,13px)\",fontWeight:700,color:\"#fff\"}}>@{p.usr}</div>\n            <div style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:p.fl?\"#FF0055\":p.W?\"#FF6B00\":\"#ffffff66\"}}>{p.bl?\"\ud83d\udeab Bloqueado\":p.fl?\"\u26a0 Reportado\":p.W?\"\ud83d\udd1e Sensual\":\"\u2713 Ok\"}</div>\n          </div>\n          <div style={{display:\"flex\",gap:5,flexShrink:0}}>\n            <button onClick={()=>onFlag(p.id)} style={{background:\"#FFD70010\",border:\"1.5px solid #FFD70025\",borderRadius:6,padding:\"5px 8px\",color:\"#FFD700\",fontSize:\"clamp(10px,3vw,13px)\"}}>\u26a0</button>\n            <button onClick={()=>onBlock(p.uid)} style={{background:\"#FF005510\",border:\"1.5px solid #FF005525\",borderRadius:6,padding:\"5px 8px\",color:\"#FF0055\",fontSize:\"clamp(10px,3vw,13px)\"}}>\ud83d\udeab</button>\n          </div>\n        </div>\n      ))}\n      {at===\"usu\u00e1rios\" && Object.entries(USERS).map(([k,u])=>(\n        <div key={k} style={{display:\"flex\",alignItems:\"center\",gap:10,padding:\"10px 0\",borderBottom:\"1px solid #ffffff08\"}}>\n          <Av init={u.av} size={38} img={u.img} />\n          <div style={{flex:1,minWidth:0}}>\n            <div style={{fontSize:\"clamp(12px,3.5vw,14px)\",fontWeight:700,color:\"#fff\"}}>@{k}</div>\n            <div style={{fontSize:\"clamp(10px,2.8vw,11px)\",color:u.role===\"admin\"?\"#FFD700\":\"#ffffff66\"}}>{u.role}</div>\n          </div>\n          {u.role!==\"admin\" && <button onClick={()=>onBlock(k)} style={{background:\"#FF005510\",border:\"1.5px solid #FF005530\",borderRadius:8,padding:\"6px 12px\",color:\"#FF0055\",fontSize:\"clamp(10px,2.8vw,12px)\"}}>Bloquear</button>}\n        </div>\n      ))}\n    </Sheet>\n  );\n}\n\n// \u2550\u2550\u2550 SETTINGS MODAL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction SettingsMod({ onClose, gps, setGps, mode, setMode, me }) {\n  return (\n    <Sheet onClose={onClose} title=\"\u2699 CONFIGURA\u00c7\u00d5ES\">\n      <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",padding:\"13px 0\",borderBottom:\"1px solid #ffffff0a\"}}>\n        <div>\n          <div style={{fontSize:\"clamp(12px,3.5vw,14px)\",fontWeight:700,color:\"#fff\"}}>\ud83d\udce1 GPS Ativo</div>\n          <div style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffff77\",marginTop:2}}>Dist\u00e2ncia real no Flerte e Por Perto</div>\n        </div>\n        <Tog on={gps} set={setGps} />\n      </div>\n      <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",padding:\"13px 0\",borderBottom:\"1px solid #ffffff0a\"}}>\n        <div>\n          <div style={{fontSize:\"clamp(12px,3.5vw,14px)\",fontWeight:700,color:\"#fff\"}}>Modo {mode===\"angel\"?\"\ud83d\ude07 Anjo\":\"\ud83d\udc8b LUST\"}</div>\n          <div style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffff77\",marginTop:2}}>{mode===\"angel\"?\"Conte\u00fado familiar\":\"Adulto desbloqueado\"}</div>\n        </div>\n        <Tog on={mode===\"wolf\"} set={()=>setMode(m=>m===\"angel\"?\"wolf\":\"angel\")} />\n      </div>\n      {me && (\n        <div style={{padding:\"13px 0\",borderBottom:\"1px solid #ffffff0a\"}}>\n          <div style={{fontSize:\"clamp(12px,3.5vw,14px)\",fontWeight:700,color:\"#fff\",marginBottom:8}}>\ud83c\udfad Perfil Por Perto</div>\n          <div style={{display:\"flex\",gap:10,alignItems:\"center\"}}>\n            <Av init={me.av} size={42} img={me.np||me.img} />\n            <div style={{flex:1}}>\n              <div style={{fontSize:\"clamp(11px,3vw,13px)\",color:\"#AA00FF\",fontWeight:600}}>{me.nn||me.username}</div>\n              <div style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff55\"}}>Foto e nome alternativos</div>\n            </div>\n            <button style={{background:\"#AA00FF18\",border:\"1.5px solid #AA00FF33\",borderRadius:8,padding:\"6px 11px\",color:\"#AA00FF\",fontSize:\"clamp(10px,2.8vw,12px)\"}}>Editar</button>\n          </div>\n        </div>\n      )}\n      <div style={{padding:\"13px 0\"}}>\n        <div style={{fontSize:\"clamp(12px,3.5vw,14px)\",fontWeight:700,color:\"#fff\",marginBottom:8}}>\ud83d\udce9 C\u00f3digo de Convite</div>\n        <div style={{background:\"#AA00FF0a\",border:\"1.5px solid #AA00FF1a\",borderRadius:11,padding:13}}>\n          <div style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(11px,3.2vw,13px)\",color:\"#AA00FF\",letterSpacing:2,marginBottom:8}}>PRIDE-2026-BSB-X7K</div>\n          <button style={{background:\"#AA00FF18\",border:\"1.5px solid #AA00FF30\",borderRadius:7,padding:\"6px 13px\",color:\"#AA00FF\",fontSize:\"clamp(10px,2.8vw,12px)\"}}>\ud83d\udccb Copiar</button>\n        </div>\n      </div>\n    </Sheet>\n  );\n}\n\n// \u2550\u2550\u2550 USER PROFILE MODAL (perfil de outro usu\u00e1rio) \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction UserProfileMod({ user, posts, isFollowing, onFollow, onClose, onChat, onTicket }) {\n  const [pt,setPt]=useState(\"posts\");\n  const filtered = pt===\"posts\"?posts:posts.filter(p=>p.ev);\n  const u = user;\n  const dispName = u.displayName||u.username||u.sn||u.uid||\"Usu\u00e1rio\";\n  const avatar = u.av||u.avatar||\"?\";\n  const imgSrc = u.img||u.avatarImg||u.p1||null;\n  const bio = u.bio||\"\";\n  const postCount = posts.length;\n\n  return (\n    <div style={{position:\"fixed\",inset:0,background:\"#07070f\",zIndex:200,display:\"flex\",flexDirection:\"column\",overflowY:\"auto\",WebkitOverflowScrolling:\"touch\"}}>\n      <style>{`body{overflow:hidden}`}</style>\n      {/* Header */}\n      <div style={{display:\"flex\",alignItems:\"center\",gap:11,padding:\"max(env(safe-area-inset-top,0px),14px) 14px 13px\",background:\"#07070f\",borderBottom:\"1px solid #ffffff0a\",flexShrink:0,position:\"sticky\",top:0,zIndex:10}}>\n        <button onClick={onClose} style={{color:\"#ffffffaa\",fontSize:22,lineHeight:1,padding:\"2px 4px\"}}>\u2190</button>\n        <span style={{fontWeight:700,fontSize:\"clamp(14px,4vw,17px)\",color:\"#fff\",flex:1}}>@{dispName}</span>\n        <button onClick={onChat} style={{background:\"linear-gradient(135deg,#AA00FF,#FF0055)\",borderRadius:10,padding:\"7px 13px\",color:\"#fff\",fontSize:\"clamp(11px,3vw,13px)\",fontWeight:700,fontFamily:\"'Orbitron',monospace\"}}>\u2709 Chat</button>\n      </div>\n      {/* Profile info */}\n      <div style={{padding:\"16px 14px 12px\"}}>\n        <div style={{display:\"flex\",gap:14,alignItems:\"center\",marginBottom:13}}>\n          <Av init={avatar} size=\"clamp(64px,18vw,80px)\" img={imgSrc} rainbow />\n          <div style={{flex:1,minWidth:0}}>\n            <div style={{fontWeight:700,fontSize:\"clamp(14px,4vw,17px)\",color:\"#fff\",marginBottom:3}}>{dispName}</div>\n            {bio&&<div style={{fontSize:\"clamp(11px,3vw,13px)\",color:\"#ffffffaa\",marginBottom:8,lineHeight:1.5}}>{bio}</div>}\n            <div style={{display:\"flex\",gap:\"clamp(10px,3vw,18px)\"}}>\n              {[[postCount,\"posts\"],[Math.floor(Math.random()*500+50),\"seguidores\"],[Math.floor(Math.random()*200+10),\"seguindo\"]].map(([n,l])=>(\n                <div key={l} style={{textAlign:\"center\"}}>\n                  <div style={{fontWeight:700,fontSize:\"clamp(13px,3.5vw,16px)\",color:\"#fff\"}}>{n}</div>\n                  <div style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff77\"}}>{l}</div>\n                </div>\n              ))}\n            </div>\n          </div>\n        </div>\n        {/* Follow button */}\n        <button onClick={onFollow}\n          style={{width:\"100%\",background:isFollowing?\"#ffffff0d\":\"linear-gradient(135deg,#AA00FF,#FF0055)\",\n            border:`1.5px solid ${isFollowing?\"#ffffff22\":\"transparent\"}`,borderRadius:12,\n            padding:\"clamp(10px,3vw,13px)\",color:\"#fff\",fontSize:\"clamp(12px,3.5vw,14px)\",\n            fontWeight:700,fontFamily:\"'Orbitron',monospace\",\n            boxShadow:isFollowing?\"none\":\"0 4px 20px #AA00FF44\",marginBottom:4}}>\n          {isFollowing?\"\u2713 Seguindo\":\"+ Seguir\"}\n        </button>\n      </div>\n      {/* Tabs */}\n      <div style={{display:\"flex\",borderBottom:\"1.5px solid #ffffff0d\",flexShrink:0}}>\n        {[\"posts\",\"eventos\"].map(t=>(\n          <button key={t} onClick={()=>setPt(t)} style={{flex:1,background:\"none\",color:pt===t?\"#fff\":\"#ffffff55\",\n            padding:\"clamp(8px,2.5vw,11px) 0\",fontSize:\"clamp(9px,2.5vw,11px)\",fontFamily:\"'Orbitron',monospace\",letterSpacing:1,\n            borderBottom:pt===t?\"2.5px solid #AA00FF\":\"2.5px solid transparent\",transition:\"all .2s\"}}>\n            {t.toUpperCase()}\n          </button>\n        ))}\n      </div>\n      {/* Posts grid */}\n      {filtered.length===0\n        ? <div style={{textAlign:\"center\",padding:\"clamp(32px,8vw,52px) 20px\",color:\"#ffffff44\",fontSize:\"clamp(12px,3.5vw,14px)\"}}>\n            Nenhuma publica\u00e7\u00e3o ainda.\n          </div>\n        : <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr 1fr\",gap:1.5,marginTop:1.5}}>\n            {filtered.map(p=>(\n              <div key={p.id} onClick={()=>p.tk&&onTicket(p.tk)} style={{aspectRatio:\"1\",overflow:\"hidden\",position:\"relative\",cursor:p.tk?\"pointer\":\"default\"}}>\n                <img src={p.img} alt=\"\" style={{width:\"100%\",height:\"100%\",objectFit:\"cover\"}} onError={e=>e.target.style.display=\"none\"} />\n                {p.ev&&<div style={{position:\"absolute\",top:4,right:4,fontSize:13}}>\ud83c\udfab</div>}\n                {p.T&&<div style={{position:\"absolute\",top:4,left:4,fontSize:9,background:\"#FF005599\",borderRadius:4,padding:\"2px 5px\",fontFamily:\"'Orbitron',monospace\",color:\"#fff\",fontWeight:700}}>T</div>}\n              </div>\n            ))}\n          </div>\n      }\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 EDIT PROFILE MODAL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction EditProfileMod({ me, myProfile, onClose, onSave }) {\n  const [dn,  setDn]  = useState(myProfile.displayName||me.username||\"\");\n  const [bio, setBio] = useState(myProfile.bio||me.bio||\"\");\n  const [web, setWeb] = useState(myProfile.website||\"\");\n  const [img, setImg] = useState(me.img||null);\n  const fileRef = useRef(null);\n\n  const pickImg = e => {\n    const f = e.target.files[0];\n    if (f) setImg(URL.createObjectURL(f));\n  };\n\n  return (\n    <Sheet onClose={onClose} title=\"\u270f\ufe0f EDITAR PERFIL\">\n      {/* Avatar picker */}\n      <div style={{display:\"flex\",justifyContent:\"center\",marginBottom:18}}>\n        <div onClick={()=>fileRef.current?.click()} style={{position:\"relative\",cursor:\"pointer\"}}>\n          <Av init={me.av} size={80} img={img} rainbow />\n          <div style={{position:\"absolute\",bottom:0,right:0,background:\"#AA00FF\",borderRadius:\"50%\",width:26,height:26,display:\"flex\",alignItems:\"center\",justifyContent:\"center\",fontSize:13,border:\"2px solid #07070f\"}}>\ud83d\udcf7</div>\n        </div>\n        <input ref={fileRef} type=\"file\" accept=\"image/*\" style={{display:\"none\"}} onChange={pickImg} />\n      </div>\n      {/* Fields */}\n      <div style={{display:\"flex\",flexDirection:\"column\",gap:11,marginBottom:18}}>\n        {[[\"Nome de exibi\u00e7\u00e3o\",dn,setDn,\"text\"],[\"Bio\",bio,setBio,\"text\"],[\"Site / Link\",web,setWeb,\"url\"]].map(([pl,val,setter,tp])=>(\n          <div key={pl}>\n            <p style={{fontSize:\"clamp(9px,2.4vw,11px)\",color:\"#ffffff88\",marginBottom:5,fontFamily:\"'Orbitron',monospace\",letterSpacing:.5}}>{pl.toUpperCase()}</p>\n            {pl===\"Bio\"\n              ? <textarea value={val} onChange={e=>setter(e.target.value)} placeholder={pl} rows={3}\n                  style={{width:\"100%\",background:\"#ffffff0d\",border:\"1.5px solid #ffffff1a\",borderRadius:12,padding:\"11px 14px\",color:\"#fff\",fontSize:\"clamp(13px,3.5vw,15px)\",resize:\"none\"}} />\n              : <input value={val} onChange={e=>setter(e.target.value)} placeholder={pl} type={tp}\n                  style={{width:\"100%\",background:\"#ffffff0d\",border:\"1.5px solid #ffffff1a\",borderRadius:12,padding:\"11px 14px\",color:\"#fff\",fontSize:\"clamp(13px,3.5vw,15px)\"}} />\n            }\n          </div>\n        ))}\n      </div>\n      <Btn onClick={()=>onSave({displayName:dn,bio,website:web,avatarUrl:img})} color=\"#AA00FF\" style={{width:\"100%\"}}>SALVAR ALTERA\u00c7\u00d5ES \u2713</Btn>\n    </Sheet>\n  );\n}\n\n// \u2550\u2550\u2550 FOLLOWERS / FOLLOWING MODAL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction FollowersMod({ type, ids, allUsers, nearby, onClose, onView }) {\n  // Monta lista com dados dos usu\u00e1rios conhecidos\n  const list = ids.length > 0 ? ids.map(uid => {\n    const u = allUsers[uid] || nearby.find(n=>n.uid===uid);\n    return u ? { uid, name: u.username||u.sn||uid, img: u.img||u.p1||null, av: u.av||uid.slice(0,2).toUpperCase() } : { uid, name: uid, img:null, av:uid.slice(0,2).toUpperCase() };\n  }) : [];\n\n  // Demo: se lista vazia, mostra exemplos da comunidade\n  const demoList = Object.entries(allUsers).slice(0,3).map(([k,u])=>({ uid:k, name:u.username||k, img:u.img, av:u.av }));\n  const display = list.length > 0 ? list : demoList;\n\n  return (\n    <Sheet onClose={onClose} title={type===\"followers\"?\"\ud83d\udc65 SEGUIDORES\":\"\ud83d\udc63 SEGUINDO\"}>\n      {display.length===0\n        ? <div style={{textAlign:\"center\",padding:\"28px 0\",color:\"#ffffff55\",fontSize:\"clamp(12px,3.5vw,14px)\"}}>\n            {type===\"followers\"?\"Nenhum seguidor ainda.\":\"Voc\u00ea n\u00e3o segue ningu\u00e9m ainda.\"}\n          </div>\n        : display.map(u=>(\n          <div key={u.uid} onClick={()=>onView({uid:u.uid,...(allUsers[u.uid]||{})})}\n            style={{display:\"flex\",alignItems:\"center\",gap:11,padding:\"11px 0\",borderBottom:\"1px solid #ffffff08\",cursor:\"pointer\"}}>\n            <Av init={u.av} size={44} img={u.img} />\n            <div style={{flex:1,minWidth:0}}>\n              <div style={{fontWeight:700,fontSize:\"clamp(13px,3.5vw,15px)\",color:\"#fff\"}}>{u.name}</div>\n              <div style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffff55\"}}>@{u.uid}</div>\n            </div>\n            <span style={{color:\"#AA00FF\",fontSize:16}}>\u203a</span>\n          </div>\n        ))\n      }\n    </Sheet>\n  );\n}\n\n// \u2550\u2550\u2550 SEARCH MODAL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction SearchMod({ posts, allUsers, nearby, isFollowing, onFollow, onClose, onView }) {\n  const [q,setQ]=useState(\"\");\n\n  // Combina USERS + INIT_NEARBY numa lista unificada\n  const allPeople = [\n    ...Object.entries(allUsers).map(([uid,u])=>({ uid, name:u.username||uid, img:u.img||null, av:u.av||\"?\", bio:u.bio||\"\", posts: posts.filter(p=>p.uid===uid).length })),\n    ...nearby.filter(u=>!allUsers[u.uid]).map(u=>({ uid:u.uid, name:u.sn||u.uid, img:u.p1||null, av:u.av||\"?\", bio:u.bio||\"\", posts:0 })),\n  ];\n\n  const results = q.trim()===\"\"\n    ? allPeople\n    : allPeople.filter(u =>\n        u.name.toLowerCase().includes(q.toLowerCase()) ||\n        u.uid.toLowerCase().includes(q.toLowerCase()) ||\n        u.bio.toLowerCase().includes(q.toLowerCase())\n      );\n\n  return (\n    <div style={{position:\"fixed\",inset:0,background:\"#07070f\",zIndex:200,display:\"flex\",flexDirection:\"column\"}}>\n      <style>{`body{overflow:hidden}`}</style>\n      {/* Search header */}\n      <div style={{padding:\"max(env(safe-area-inset-top,0px),14px) 14px 12px\",background:\"#07070f\",borderBottom:\"1px solid #ffffff0a\",flexShrink:0}}>\n        <div style={{display:\"flex\",alignItems:\"center\",gap:10,marginBottom:12}}>\n          <button onClick={onClose} style={{color:\"#ffffffaa\",fontSize:22,lineHeight:1}}>\u2190</button>\n          <h2 style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(12px,3.5vw,15px)\",color:\"#fff\",letterSpacing:1,flex:1}}>\ud83d\udd0d BUSCAR PESSOAS</h2>\n        </div>\n        <div style={{position:\"relative\"}}>\n          <span style={{position:\"absolute\",left:13,top:\"50%\",transform:\"translateY(-50%)\",fontSize:15,pointerEvents:\"none\"}}>\ud83d\udd0d</span>\n          <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder=\"Nome, usu\u00e1rio, bio\u2026\"\n            style={{width:\"100%\",background:\"#ffffff0d\",border:\"1.5px solid #AA00FF44\",borderRadius:14,\n              padding:\"clamp(11px,3vw,13px) 14px clamp(11px,3vw,13px) 38px\",\n              color:\"#fff\",fontSize:\"clamp(13px,3.5vw,15px)\"}} />\n          {q&&<button onClick={()=>setQ(\"\")} style={{position:\"absolute\",right:12,top:\"50%\",transform:\"translateY(-50%)\",color:\"#ffffff55\",fontSize:16}}>\u2715</button>}\n        </div>\n      </div>\n      {/* Results */}\n      <div style={{flex:1,overflowY:\"auto\",WebkitOverflowScrolling:\"touch\"}}>\n        {q===\"\"&&<p style={{padding:\"12px 16px\",fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffff44\",fontFamily:\"'Orbitron',monospace\",letterSpacing:1}}>COMUNIDADE \u00b7 BRAS\u00cdLIA</p>}\n        {results.length===0\n          ? <div style={{textAlign:\"center\",padding:\"44px 20px\",color:\"#ffffff44\",fontSize:\"clamp(13px,3.5vw,15px)\"}}>\n              Nenhum resultado para \"{q}\"\n            </div>\n          : results.map(u=>(\n            <div key={u.uid} style={{display:\"flex\",alignItems:\"center\",gap:12,padding:\"12px 16px\",borderBottom:\"1px solid #ffffff08\"}}>\n              <div onClick={()=>onView({uid:u.uid,...(allUsers[u.uid]||{})})} style={{cursor:\"pointer\",flexShrink:0}}>\n                <Av init={u.av} size={48} img={u.img} />\n              </div>\n              <div style={{flex:1,minWidth:0,cursor:\"pointer\"}} onClick={()=>onView({uid:u.uid,...(allUsers[u.uid]||{})})}>\n                <div style={{fontWeight:700,fontSize:\"clamp(13px,3.5vw,15px)\",color:\"#fff\"}}>{u.name}</div>\n                <div style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffff55\",marginBottom:u.bio?2:0}}>@{u.uid} \u00b7 {u.posts} posts</div>\n                {u.bio&&<div style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffffaa\",overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\"}}>{u.bio}</div>}\n              </div>\n              <button onClick={()=>onFollow(u.uid)}\n                style={{flexShrink:0,background:isFollowing(u.uid)?\"#ffffff0d\":\"linear-gradient(135deg,#AA00FF,#FF0055)\",\n                  border:`1.5px solid ${isFollowing(u.uid)?\"#ffffff22\":\"transparent\"}`,borderRadius:10,\n                  padding:\"7px 13px\",color:\"#fff\",fontSize:\"clamp(10px,2.8vw,12px)\",fontWeight:700}}>\n                {isFollowing(u.uid)?\"\u2713\":\"+ Seguir\"}\n              </button>\n            </div>\n          ))\n        }\n      </div>\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 NEW STORY MODAL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction NewStoryMod({ onClose, onPost, me }) {\n  const [prev,     setPrev]     = useState(null);\n  const [mediaType,setMediaType]= useState(\"image\");\n  const [caption,  setCaption]  = useState(\"\");\n  const [link,     setLink]     = useState(\"\");      // link estilo Instagram\n  const [showLink, setShowLink] = useState(false);  // toggle campo link\n  const fileRef  = useRef(null);\n  const videoRef = useRef(null);\n\n  const pick = e => {\n    const f = e.target.files[0];\n    if (!f) return;\n    setMediaType(f.type.startsWith(\"video/\") ? \"video\" : \"image\");\n    setPrev(URL.createObjectURL(f));\n  };\n\n  const fmtLink = raw => {\n    if (!raw) return \"\";\n    if (/^https?:\\/\\//i.test(raw)) return raw;\n    return \"https://\" + raw;\n  };\n\n  const post = () => {\n    if (!prev) return;\n    onPost({ img:prev, mediaType, caption, link: fmtLink(link) });\n    onClose();\n  };\n\n  return (\n    <div style={{position:\"fixed\",inset:0,background:\"#07070f\",zIndex:250,display:\"flex\",flexDirection:\"column\"}}>\n      <style>{GS}</style>\n\n      {/* Header */}\n      <div style={{display:\"flex\",alignItems:\"center\",gap:11,\n        paddingTop:\"max(env(safe-area-inset-top,0px),14px)\",paddingBottom:12,\n        paddingLeft:12,paddingRight:12,\n        background:\"#07070f\",borderBottom:\"1px solid #ffffff0a\",flexShrink:0}}>\n        <button onClick={onClose} style={{color:\"#ffffffaa\",fontSize:22,lineHeight:1,padding:\"2px 4px\"}}>\u2715</button>\n        <h2 style={{flex:1,fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(12px,3.5vw,15px)\",\n          letterSpacing:1,color:\"#fff\",textAlign:\"center\"}}>NOVO STORY</h2>\n        <button onClick={post} disabled={!prev}\n          style={{background:prev?\"linear-gradient(135deg,#AA00FF,#FF0055)\":\"#ffffff15\",\n            border:\"none\",borderRadius:12,padding:\"8px 16px\",color:prev?\"#fff\":\"#ffffff44\",\n            fontSize:\"clamp(12px,3.5vw,14px)\",fontWeight:700,fontFamily:\"'Orbitron',monospace\",\n            boxShadow:prev?\"0 0 14px #AA00FF44\":\"none\"}}>\n          PUBLICAR\n        </button>\n      </div>\n\n      {/* Preview */}\n      <div style={{flex:1,position:\"relative\",background:\"#000\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",overflow:\"hidden\"}}>\n        {!prev ? (\n          <div onClick={()=>fileRef.current?.click()}\n            style={{display:\"flex\",flexDirection:\"column\",alignItems:\"center\",gap:16,cursor:\"pointer\",padding:32}}>\n            <div style={{width:90,height:90,borderRadius:\"50%\",\n              background:`conic-gradient(${RAINBOW.join(\",\")})`,padding:3,\n              display:\"flex\",alignItems:\"center\",justifyContent:\"center\"}}>\n              <div style={{width:\"100%\",height:\"100%\",borderRadius:\"50%\",background:\"#07070f\",\n                display:\"flex\",alignItems:\"center\",justifyContent:\"center\",fontSize:32}}>\ud83d\udcf7</div>\n            </div>\n            <div style={{textAlign:\"center\"}}>\n              <p style={{color:\"#fff\",fontWeight:700,fontSize:\"clamp(14px,4vw,17px)\",marginBottom:6}}>Adicionar ao story</p>\n              <p style={{color:\"#ffffff66\",fontSize:\"clamp(11px,3vw,13px)\",lineHeight:1.5}}>\n                Fotos e v\u00eddeos curtos<br/>at\u00e9 <strong style={{color:\"#AA00FF\"}}>10 segundos</strong> \u00b7 vis\u00edveis por 24h\n              </p>\n            </div>\n            <div style={{display:\"flex\",gap:12}}>\n              {[[\"\ud83d\uddbc\ufe0f\",\"Foto\"],[\"\ud83c\udfac\",\"V\u00eddeo 10s\"],[\"\ud83d\udd17\",\"Link\"]].map(([ic,lb])=>(\n                <div key={lb} style={{background:\"#ffffff0d\",borderRadius:12,padding:\"10px 14px\",\n                  display:\"flex\",alignItems:\"center\",gap:7,border:\"1.5px solid #ffffff15\"}}>\n                  <span style={{fontSize:16}}>{ic}</span>\n                  <span style={{color:\"#fff\",fontSize:\"clamp(11px,3vw,13px)\",fontWeight:600}}>{lb}</span>\n                </div>\n              ))}\n            </div>\n          </div>\n        ) : mediaType===\"video\" ? (\n          <video ref={videoRef} src={prev} style={{maxWidth:\"100%\",maxHeight:\"100%\",objectFit:\"contain\"}}\n            controls autoPlay muted loop />\n        ) : (\n          <img src={prev} alt=\"\" style={{maxWidth:\"100%\",maxHeight:\"100%\",objectFit:\"contain\"}} />\n        )}\n\n        {/* Overlay bot\u00f5es quando tem m\u00eddia */}\n        {prev && (\n          <>\n            <button onClick={()=>fileRef.current?.click()}\n              style={{position:\"absolute\",top:14,left:14,background:\"#000000bb\",backdropFilter:\"blur(8px)\",\n                borderRadius:10,padding:\"7px 12px\",color:\"#fff\",fontSize:\"clamp(11px,3vw,13px)\",\n                border:\"1.5px solid #ffffff22\",display:\"flex\",alignItems:\"center\",gap:6}}>\n              \ud83d\udcf7 Trocar\n            </button>\n            {/* Bot\u00e3o Link no preview */}\n            <button onClick={()=>setShowLink(v=>!v)}\n              style={{position:\"absolute\",top:14,right:14,background:link?\"linear-gradient(135deg,#AA00FF,#FF0055)\":\"#000000bb\",\n                backdropFilter:\"blur(8px)\",borderRadius:10,padding:\"7px 12px\",\n                color:\"#fff\",fontSize:\"clamp(11px,3vw,13px)\",\n                border:`1.5px solid ${link?\"#AA00FF55\":\"#ffffff22\"}`,\n                display:\"flex\",alignItems:\"center\",gap:6,\n                boxShadow:link?\"0 0 12px #AA00FF55\":\"none\"}}>\n              \ud83d\udd17 {link ? \"Link \u2713\" : \"Adicionar link\"}\n            </button>\n          </>\n        )}\n\n        {/* Preview do link sobre a imagem */}\n        {prev && link && !showLink && (\n          <div style={{position:\"absolute\",bottom:14,left:\"50%\",transform:\"translateX(-50%)\",\n            background:\"#000000cc\",backdropFilter:\"blur(10px)\",borderRadius:20,\n            padding:\"8px 18px\",display:\"flex\",alignItems:\"center\",gap:7,\n            border:\"1.5px solid #AA00FF44\",maxWidth:\"80%\"}}>\n            <span style={{fontSize:14}}>\ud83d\udd17</span>\n            <span style={{color:\"#AA00FF\",fontSize:\"clamp(10px,2.8vw,12px)\",\n              overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\",fontWeight:600}}>\n              {link.replace(/^https?:\\/\\//,\"\").slice(0,32)}\n            </span>\n            <span style={{color:\"#ffffff55\",fontSize:\"clamp(9px,2.4vw,11px)\"}}>Ver mais \u203a</span>\n
