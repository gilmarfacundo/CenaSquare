e on mobile)\n    if (window.visualViewport) {\n      window.visualViewport.addEventListener('resize', set);\n    }\n    return () => {\n      window.removeEventListener('resize', set);\n      window.removeEventListener('orientationchange', onOri);\n      if (window.visualViewport) window.visualViewport.removeEventListener('resize', set);\n    };\n  }, []);\n  return window.innerHeight;\n}\n\n// \u2550\u2550\u2550 UI PRIMITIVES \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction Av({ init=\"?\", size=40, img=null, online=false, rainbow=false }) {\n  const [imgFailed, setImgFailed] = useState(false);\n  // reset if img prop changes\n  useEffect(() => { setImgFailed(false); }, [img]);\n\n  const isNum = typeof size === \"number\";\n  const cssSz = isNum ? size + \"px\" : size;\n\n  const showImg = img && !imgFailed;\n\n  const inner = showImg\n    ? <img src={img}\n        style={{width:cssSz,height:cssSz,minWidth:cssSz,minHeight:cssSz,\n          borderRadius:\"50%\",objectFit:\"cover\",display:\"block\",flexShrink:0}}\n        onError={() => setImgFailed(true)} />\n    : <div style={{width:cssSz,height:cssSz,minWidth:cssSz,minHeight:cssSz,borderRadius:\"50%\",\n        background:`linear-gradient(135deg,${rc(init)},${rc2(init)})`,\n        display:\"flex\",alignItems:\"center\",justifyContent:\"center\",\n        fontSize:`calc(${cssSz} * 0.34)`,fontWeight:700,color:\"#fff\",\n        fontFamily:\"'Orbitron',monospace\",flexShrink:0}}>\n        {(init||\"?\").slice(0,2).toUpperCase()}\n      </div>;\n\n  return (\n    <div style={{position:\"relative\",display:\"inline-flex\",flexShrink:0}}>\n      {rainbow\n        ? <div style={{background:`conic-gradient(${RAINBOW.join(\",\")})`,padding:\"2.5px\",borderRadius:\"50%\",display:\"inline-flex\"}}>\n            <div style={{background:\"#07070f\",padding:\"2px\",borderRadius:\"50%\",display:\"inline-flex\"}}>{inner}</div>\n          </div>\n        : inner}\n      {online && <div style={{position:\"absolute\",bottom:1,right:1,\n        width:`calc(${cssSz} * 0.22)`,height:`calc(${cssSz} * 0.22)`,\n        minWidth:7,minHeight:7,borderRadius:\"50%\",\n        background:\"#00E676\",border:\"2px solid #07070f\",boxShadow:\"0 0 6px #00E676\"}} />}\n    </div>\n  );\n}\n\nfunction Tog({ on, set }) {\n  return (\n    <div onClick={() => set(v=>!v)} role=\"switch\" aria-checked={on}\n      style={{width:48,height:27,borderRadius:14,flexShrink:0,cursor:\"pointer\",transition:\"all .3s\",\n        background: on ? \"linear-gradient(90deg,#AA00FF,#FF0055)\" : \"#ffffff18\",\n        border:`1.5px solid ${on?\"#AA00FF55\":\"#ffffff1a\"}`,\n        boxShadow: on ? \"0 0 14px #AA00FF55\" : \"none\", position:\"relative\"}}>\n      <div style={{width:21,height:21,borderRadius:\"50%\",background:\"#fff\",position:\"absolute\",\n        top:2,left:on?23:2,transition:\"left .3s\",boxShadow:\"0 2px 6px #00000055\"}} />\n    </div>\n  );\n}\n\nfunction Btn({ children, onClick, color=\"#AA00FF\", style={}, disabled=false, outline=false }) {\n  return (\n    <button onClick={onClick} disabled={disabled}\n      style={{background: disabled?\"#ffffff12\": outline?\"transparent\":`linear-gradient(135deg,${color},${color}cc)`,\n        border:`1.5px solid ${disabled?\"#ffffff15\":color+\"55\"}`,borderRadius:14,padding:\"13px 18px\",\n        color: disabled?\"#ffffff44\": outline?color:\"#fff\",fontWeight:700,fontFamily:\"'Orbitron',monospace\",\n        fontSize:\"clamp(11px,3vw,13px)\",letterSpacing:.5,\n        boxShadow: disabled||outline?\"none\":`0 4px 20px ${color}33`,\n        cursor:disabled?\"not-allowed\":\"pointer\",transition:\"all .2s\",...style}}>\n      {children}\n    </button>\n  );\n}\n\nfunction Sheet({ children, onClose, title=\"\" }) {\n  return (\n    <div style={{position:\"fixed\",inset:0,background:\"#000000cc\",zIndex:200,display:\"flex\",alignItems:\"flex-end\"}}\n      onClick={onClose}>\n      <div onClick={e=>e.stopPropagation()} className=\"fu\"\n        style={{background:\"#0e0e1e\",borderRadius:\"22px 22px 0 0\",width:\"100%\",maxWidth:480,margin:\"0 auto\",\n          border:\"1.5px solid #ffffff0a\",maxHeight:\"92dvh\",overflowY:\"auto\",boxShadow:\"0 -8px 40px #00000088\"}}>\n        <div style={{width:36,height:4,background:\"#ffffff22\",borderRadius:2,margin:\"14px auto 0\"}} />\n        {title && <h3 style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(12px,3.5vw,14px)\",\n          letterSpacing:1,color:\"#fff\",padding:\"12px 20px 10px\"}}>{title}</h3>}\n        <div style={{padding: title?\"0 18px 28px\":\"18px 18px 28px\"}}>{children}</div>\n      </div>\n    </div>\n  );\n}\n\n\n// \u2550\u2550\u2550 MAIN APP \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction App() {\n  const appH = useVH();\n  const [screen,    setScreen]    = useState(\"agecheck\");\n  const [me,        setMe]        = useState(null);\n  const [tab,       setTab]       = useState(\"feed\");\n  const [mode,      setMode]      = useState(\"angel\");\n  const [posts,     setPosts]     = useState(INIT_POSTS);\n  const [nearby,    setNearby]    = useState(INIT_NEARBY);\n  const [gps,       setGps]       = useState(false);\n  const [myLat,     setMyLat]     = useState(null);\n  const [myLon,     setMyLon]     = useState(null);\n  const [likes,     setLikes]     = useState({});\n  const [chats,     setChats]     = useState({});\n  const [notifs,    setNotifs]    = useState([]);\n  const [myTix,     setMyTix]     = useState([]);\n  const [showHope,  setShowHope]  = useState(false);\n  const [hopeMsg]                 = useState(HOPE[Math.floor(Math.random()*HOPE.length)]);\n  const [ticketM,   setTicketM]   = useState(null);\n  const [storyM,    setStoryM]    = useState(null);\n  const [newPostM,  setNewPostM]  = useState(false);\n  const [newStoryM, setNewStoryM] = useState(false);   // modal criar story\n  const [settingsM, setSettingsM] = useState(false);\n  const [adminM,    setAdminM]    = useState(false);\n  const [nearbyPM,  setNearbyPM]  = useState(null);\n  const [nearbyChat,setNearbyChat]= useState(null);\n  const [dmUser,    setDmUser]    = useState(null);\n  const [viewUser,  setViewUser]  = useState(null);\n  const [editProf,  setEditProf]  = useState(false);\n  const [followersM,setFollowersM]= useState(null);\n  const [searchM,   setSearchM]   = useState(false);\n  const [myProfile, setMyProfile] = useState({bio:\"\",website:\"\",displayName:\"\",followers:[],following:[]});\n\n  // Stories din\u00e2micos (come\u00e7a com os fixos, pode crescer)\n  const [stories, setStories] = useState(STORIES);\n  const addStory = (s) => setStories(prev => [{...prev[0], img:s.img, mediaType:s.mediaType}, ...prev.slice(1)]);\n\n  // \u2500\u2500 GPS watch (real browser API) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const gpsWatchRef = useRef(null);\n  const startGps = useCallback(() => {\n    if (!navigator.geolocation) return;\n    if (gpsWatchRef.current) navigator.geolocation.clearWatch(gpsWatchRef.current);\n    gpsWatchRef.current = navigator.geolocation.watchPosition(\n      p => { setMyLat(p.coords.latitude); setMyLon(p.coords.longitude); },\n      () => {},\n      { enableHighAccuracy:true, maximumAge:15000 }\n    );\n  }, []);\n  useEffect(() => {\n    if (gps) startGps();\n    else if (gpsWatchRef.current) { navigator.geolocation?.clearWatch(gpsWatchRef.current); gpsWatchRef.current=null; }\n  }, [gps, startGps]);\n\n  // \u2500\u2500 Nearby with real distances \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const nearbyCalc = nearby.map(u => {\n    if (myLat && myLon) {\n      const km = haversineKm(myLat, myLon, u.lat, u.lon);\n      return { ...u, dist: fmtDist(km), distKm: km };\n    }\n    return { ...u, dist:\"?km\", distKm:999 };\n  }).sort((a,b) => a.distKm - b.distKm);\n\n  // \u2500\u2500 API stubs (backend-ready) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const apiLogin = async (username, password) => {\n    // \u2192 POST ${API.BASE_URL}/auth/login { username, password }\n    const u = USERS[username];\n    if (u && u.pw === password) return { ...u, username };\n    throw new Error(\"Credenciais inv\u00e1lidas\");\n  };\n\n  const apiBuyTicket = async (ticket, payMethod, payData) => {\n    // \u2192 POST ${API.BASE_URL}/tickets/buy\n    // \u2192 window.MercadoPago(API.MP_PUBLIC_KEY).createCardToken(payData)\n    const commission = +(ticket.pn * 0.15).toFixed(2);\n    return { ...ticket, code:\"CSQ-\"+Date.now().toString().slice(-6),\n      commission, net:+(ticket.pn-commission).toFixed(2),\n      purchasedAt: new Date().toLocaleDateString(\"pt-BR\"), payMethod, emailSent:true };\n  };\n\n  const doLogin = u => {\n    setMe(u); setShowHope(true);\n    setTimeout(() => { setShowHope(false); setScreen(\"app\"); }, 2800);\n  };\n  const flagPost   = id  => { setPosts(ps=>ps.map(p=>p.id===id?{...p,fl:true}:p)); setNotifs(n=>[...n,{id:Date.now(),txt:`Post #${id} marcado`}]); };\n  const blockUser  = uid => { setPosts(ps=>ps.map(p=>p.uid===uid?{...p,bl:true}:p)); setNearby(nb=>nb.map(u=>u.uid===uid?{...u,bl:true}:u)); setNotifs(n=>[...n,{id:Date.now(),txt:`@${uid} bloqueado`}]); };\n  const addPost    = p   => setPosts(ps=>[p,...ps]);\n  const deletePost = id  => setPosts(ps=>ps.filter(p=>p.id!==id));\n  const editPost   = (id, newCap) => setPosts(ps=>ps.map(p=>p.id===id?{...p,cap:newCap}:p));\n  // Coment\u00e1rios: cada post tem p.comments como array [{id,uid,usr,av,text,tm}]\n  const addComment = (postId, comment) => setPosts(ps=>ps.map(p=>{\n    if(p.id!==postId) return p;\n    const arr = Array.isArray(p.comments)?p.comments:[];\n    return {...p, comments:[...arr, comment], cm:(Array.isArray(p.comments)?p.comments.length:0)+1};\n  }));\n  const deleteComment = (postId, commentId) => setPosts(ps=>ps.map(p=>{\n    if(p.id!==postId) return p;\n    const arr = Array.isArray(p.comments)?p.comments.filter(c=>c.id!==commentId):[];\n    return {...p, comments:arr, cm:arr.length};\n  }));\n  const likeNearby  = id  => setNearby(nb=>nb.map(u=>u.id===id?{...u,lk:!u.lk}:u));\n  const sendChat    = (uid,msg) => setChats(c=>({...c,[uid]:[...(c[uid]||[]),{...msg,id:Date.now(),from:\"me\"}]}));\n  const buyTicket   = async (t,method,data) => { const r=await apiBuyTicket(t,method,data); setMyTix(prev=>[...prev,r]); };\n\n  const toggleFollow = (uid) => setMyProfile(p => {\n    const isF = p.following.includes(uid);\n    return { ...p, following: isF ? p.following.filter(x=>x!==uid) : [...p.following, uid] };\n  });\n  const saveProfile = (data) => { setMyProfile(p=>({...p,...data})); setEditProf(false); };\n\n  const openUserProfile = (uid) => {\n    // abre perfil de qualquer usu\u00e1rio pelo uid\n    const userData = USERS[uid] || INIT_NEARBY.find(u=>u.uid===uid) || { username:uid };\n    setViewUser({ uid, ...userData });\n  };\n\n  const isAdmin = me?.role === \"admin\";\n\n  // Feed: s\u00f3 posts de perfis seguidos + posts pr\u00f3prios (+ admin v\u00ea tudo)\n  const following = myProfile.following || [];\n  const visible = posts.filter(p => {\n    if (p.bl) return false;\n    if (mode===\"angel\" && p.W) return false;\n    if (!isAdmin && p.uid !== me?.username && !following.includes(p.uid)) return false;\n    return true;\n  });\n\n  const isChatScreen = tab===\"nearby_chat\" || tab===\"dm_chat\";\n\n  // \u2500\u2500 Pull-to-refresh \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const [refreshing,  setRefreshing]  = useState(false);\n  const [pullY,       setPullY]       = useState(0);     // pixels arrastados\n  const [pullActive,  setPullActive]  = useState(false);\n  const touchStartY  = useRef(0);\n  const contentRef   = useRef(null);\n  const PULL_THRESH  = 72; // pixels para disparar refresh\n\n  const doRefresh = () => {\n    setRefreshing(true);\n    setPullY(0);\n    // Simula busca de novos posts (trocar por chamada real ao backend)\n    setTimeout(() => {\n      // TODO: GET ${API.BASE_URL}/feed?following=${following.join(\",\")}\n      setRefreshing(false);\n    }, 1400);\n  };\n\n  const onTouchStart = (e) => {\n    if (tab !== \"feed\") return;\n    const el = contentRef.current;\n    if (el && el.scrollTop === 0) {\n      touchStartY.current = e.touches[0].clientY;\n      setPullActive(true);\n    }\n  };\n  const onTouchMove = (e) => {\n    if (!pullActive || refreshing) return;\n    const dy = e.touches[0].clientY - touchStartY.current;\n    if (dy > 0) {\n      // Resist\u00eancia progressiva \u2014 fica mais dif\u00edcil quanto mais puxa\n      setPullY(Math.min(dy * 0.45, PULL_THRESH + 20));\n    }\n  };\n  const onTouchEnd = () => {\n    if (!pullActive) return;\n    setPullActive(false);\n    if (pullY >= PULL_THRESH) { doRefresh(); }\n    else { setPullY(0); }\n  };\n\n  if (screen===\"agecheck\") return <AgeCheck onPass={()=>setScreen(\"login\")} />;\n  if (screen===\"login\")    return <LoginScr onLogin={doLogin} onSignup={()=>setScreen(\"signup\")} apiLogin={apiLogin} />;\n  if (screen===\"signup\")   return <SignupScr onBack={()=>setScreen(\"login\")} onDone={()=>setScreen(\"login\")} />;\n  if (showHope)            return <HopeScr msg={hopeMsg} />;\n\n  return (\n    <div style={{background:\"#07070f\",height:appH,width:\"100%\",\n      fontFamily:\"'Exo 2',sans-serif\",color:\"#fff\",display:\"flex\",flexDirection:\"column\",\n      overflow:\"visible\",    /* permite + button aparecer acima */\n      position:\"relative\",boxSizing:\"border-box\"}}>\n      <style>{GS}</style>\n\n      {/* \u2500\u2500 TOP BAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */}\n      {!isChatScreen && (\n        <div style={{flexShrink:0,paddingTop:\"max(env(safe-area-inset-top,0px),12px)\",\n          padding:\"max(env(safe-area-inset-top,0px),12px) 14px 8px\",\n          background:\"linear-gradient(180deg,#07070f 80%,transparent)\",zIndex:90}}>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:\"clamp(5px,1.8vw,9px)\"}}>\n            {/* ANJO / LUST \u2014 lado esquerdo */}\n            <button onClick={()=>setMode(m=>m===\"angel\"?\"wolf\":\"angel\")}\n              style={{background:mode===\"wolf\"?\"linear-gradient(135deg,#FF005520,#AA00FF20)\":\"#ffffff0a\",\n                border:`1.5px solid ${mode===\"wolf\"?\"#FF005544\":\"#ffffff15\"}`,borderRadius:20,\n                padding:\"5px 9px\",color:\"#fff\",display:\"flex\",alignItems:\"center\",gap:4,\n                boxShadow:mode===\"wolf\"?\"0 0 14px #FF005544\":\"none\",transition:\"all .3s\",flexShrink:0}}>\n              <span style={{fontSize:\"clamp(12px,3.5vw,15px)\"}}>{mode===\"angel\"?\"\ud83d\ude07\":\"\ud83d\udc8b\"}</span>\n              <span style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(8px,2vw,10px)\",fontWeight:700}}>\n                {mode===\"angel\"?\"ANJO\":\"LUST\"}\n              </span>\n            </button>\n            {/* Logo title */}\n            <span className=\"gl\" style={{flex:1,textAlign:\"center\",fontFamily:\"'Orbitron',monospace\",\n              fontSize:\"clamp(13px,4.2vw,20px)\",fontWeight:900,letterSpacing:.3,lineHeight:1}}>\n              {[...\"CenaSquare\"].map((c,i)=>\n                <span key={i} style={{color:RAINBOW[i%RAINBOW.length],textShadow:`0 0 8px ${RAINBOW[i%RAINBOW.length]}88`}}>{c}</span>\n              )}\n            </span>\n            {/* Right controls */}\n            <div style={{display:\"flex\",gap:\"clamp(4px,1.5vw,7px)\",alignItems:\"center\",flexShrink:0}}>\n              {isAdmin && (\n                <button onClick={()=>setAdminM(true)}\n                  style={{background:\"#FFD70018\",border:\"1.5px solid #FFD70044\",borderRadius:8,\n                    padding:\"4px 8px\",color:\"#FFD700\",fontSize:\"clamp(8px,2vw,10px)\",\n                    fontFamily:\"'Orbitron',monospace\"}}>\u26a1ADM</button>\n              )}\n              <button onClick={()=>setTab(\"dm\")} style={{color:\"#ffffffcc\",fontSize:\"clamp(17px,4.5vw,21px)\",lineHeight:1,padding:\"2px 0\"}}>\u2709</button>\n              <button onClick={()=>setSearchM(true)} style={{color:\"#ffffffcc\",fontSize:\"clamp(17px,4.5vw,21px)\",lineHeight:1,padding:\"2px 0\"}}>\ud83d\udd0d</button>\n            </div>\n          </div>\n        </div>\n      )}\n\n      {/* \u2500\u2500 CONTENT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */}\n      <div ref={contentRef}\n        style={{flex:1,overflowY:\"auto\",overflowX:\"hidden\",WebkitOverflowScrolling:\"touch\"}}\n        onTouchStart={onTouchStart}\n        onTouchMove={onTouchMove}\n        onTouchEnd={onTouchEnd}>\n        {tab===\"feed\" && (\n          <FeedView\n            posts={visible} likes={likes} setLikes={setLikes}\n            onTicket={setTicketM} onStory={setStoryM}\n            isAdmin={isAdmin} onFlag={flagPost} onBlock={blockUser}\n            mode={mode} onUserProfile={openUserProfile}\n            stories={stories} onNewStory={()=>setNewStoryM(true)} me={me}\n            onDeletePost={deletePost} onEditPost={editPost}\n            onAddComment={addComment} onDeleteComment={deleteComment}\n            following={following}\n            onFollow={uid=>{toggleFollow(uid);}}\n            pullY={tab===\"feed\"?pullY:0}\n            refreshing={refreshing}\n          />\n        )}\n        {tab===\"flirt\"       && <FlirtView   nearby={nearbyCalc} gps={gps} onStartChat={u=>{setNearbyChat(u);setTab(\"nearby_chat\");}} onLike={likeNearby} onUserProfile={openUserProfile} />}\n        {tab===\"tickets\"     && <TicketsView tickets={TICKETS} onBuy={setTicketM} isAdmin={isAdmin} />}\n        {tab===\"nearby\"      && <NearbyView  nearby={nearbyCalc} me={me} gps={gps} setGps={setGps} onProfile={setNearbyPM} onLike={likeNearby} />}\n        {tab===\"mytickets\"   && <MyTicketsView myTix={myTix} />}\n        {tab===\"profile\"     && <ProfileView me={me} myProfile={myProfile} posts={posts.filter(p=>p.uid===me?.username)} onTicket={setTicketM} isAdmin={isAdmin} onSettings={()=>setSettingsM(true)} notifs={notifs} onEdit={()=>setEditProf(true)} onFollowers={()=>setFollowersM(\"followers\")} onFollowing={()=>setFollowersM(\"following\")} onSearch={()=>setSearchM(true)} followCount={myProfile.following.length} followerCount={myProfile.followers.length} />}\n        {tab===\"dm\"          && <DMList      chats={chats} nearby={nearbyCalc} onOpen={u=>{setDmUser(u);setTab(\"dm_chat\");}} />}\n        {tab===\"dm_chat\"     && dmUser     && <ChatView user={dmUser}      msgs={chats[dmUser.uid]||[]}      onBack={()=>setTab(\"dm\")}     onSend={m=>sendChat(dmUser.uid,m)}      title={dmUser.sn||dmUser.nn} nearby />}\n        {tab===\"nearby_chat\" && nearbyChat && <ChatView user={nearbyChat}  msgs={chats[nearbyChat.uid]||[]}  onBack={()=>setTab(\"nearby\")} onSend={m=>sendChat(nearbyChat.uid,m)}  title={nearbyChat.sn} subtitle={\"\ud83d\udccd \"+nearbyChat.dist} nearby />}\n      </div>\n\n      {/* \u2500\u2500 BOTTOM NAV \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */}\n      {!isChatScreen && <BotNav tab={tab} setTab={setTab} onPost={()=>setNewPostM(true)} tixCount={myTix.length} />}\n\n      {/* \u2500\u2500 MODALS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */}\n      {storyM    && <StoryMod    user={storyM}   onClose={()=>setStoryM(null)} />}\n      {newStoryM && <NewStoryMod onClose={()=>setNewStoryM(false)} onPost={addStory} me={me} />}\n      {ticketM   && <TicketMod   t={ticketM}     onClose={()=>setTicketM(null)} onBuy={buyTicket} />}\n      {newPostM  && <NewPostMod  onClose={()=>setNewPostM(false)} onPost={addPost} me={me} />}\n      {settingsM && <SettingsMod onClose={()=>setSettingsM(false)} gps={gps} setGps={setGps} mode={mode} setMode={setMode} me={me} />}\n      {adminM    && <AdminMod    posts={posts} onFlag={flagPost} onBlock={blockUser} onClose={()=>setAdminM(false)} />}\n      {nearbyPM  && <NearbyPMod  user={nearbyPM} onClose={()=>setNearbyPM(null)} onChat={()=>{setNearbyChat(nearbyPM);setNearbyPM(null);setTab(\"nearby_chat\");}} onLike={()=>{likeNearby(nearbyPM.id);setNearbyPM(p=>({...p,lk:!p.lk}));}} />}\n      {viewUser  && <UserProfileMod user={viewUser} posts={posts.filter(p=>p.uid===viewUser.uid)} isFollowing={myProfile.following.includes(viewUser.uid)} onFollow={()=>toggleFollow(viewUser.uid)} onClose={()=>setViewUser(null)} onChat={()=>{setDmUser(viewUser);setViewUser(null);setTab(\"dm_chat\");}} onTicket={setTicketM} />}\n      {editProf  && <EditProfileMod me={me} myProfile={myProfile} onClose={()=>setEditProf(false)} onSave={saveProfile} />}\n      {followersM&& <FollowersMod type={followersM} ids={followersM===\"followers\"?myProfile.followers:myProfile.following} allUsers={USERS} nearby={nearbyCalc} onClose={()=>setFollowersM(null)} onView={u=>{setFollowersM(null);setViewUser(u);}} />}\n      {searchM   && <SearchMod    posts={posts} allUsers={USERS} nearby={nearbyCalc} isFollowing={uid=>myProfile.following.includes(uid)} onFollow={toggleFollow} onClose={()=>setSearchM(false)} onView={u=>{setSearchM(false);setViewUser(u);}} />}\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 AGE CHECK + FULL LGPD TERMS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction AgeCheck({ onPass }) {\n  const [step,    setStep]    = useState(0); // 0=age 1=terms 2=blocked\n  const [day,     setDay]     = useState(\"\");\n  const [month,   setMonth]   = useState(\"\");\n  const [year,    setYear]    = useState(\"\");\n  const [allRead, setAllRead] = useState(false);\n  const [chk,     setChk]     = useState({t1:false,t2:false,t3:false,t4:false,t5:false});\n  const scrollRef = useRef(null);\n  const dayRef   = useRef(null);\n  const monthRef = useRef(null);\n  const yearRef  = useRef(null);\n\n  const calcAge = () => {\n    const d=parseInt(day), m=parseInt(month), y=parseInt(year);\n    if (!d||!m||!y||y<1900||y>2020) return null;\n    let age = new Date().getFullYear() - y;\n    if (new Date().getMonth()<m-1||(new Date().getMonth()===m-1&&new Date().getDate()<d)) age--;\n    return age;\n  };\n  const doCheck = () => { const a=calcAge(); if(a===null)return; setStep(a<18?2:1); };\n  const allChk = chk.t1;\n  const canGo  = allChk && allRead;\n\n  const UNIFIED_LABEL = \"Li e aceito todos os Termos de Uso, a Pol\u00edtica de Privacidade e Prote\u00e7\u00e3o de Dados (LGPD, Lei 13.709/2018), o Marco Civil da Internet (Lei 12.965/2014) e confirmo que tenho 18 anos ou mais. Estou ciente de que conte\u00fado adulto pode estar dispon\u00edvel com meu consentimento, e que uso indevido \u00e9 de minha exclusiva responsabilidade legal.\";\n\n  return (\n    <div style={{position:\"fixed\",inset:0,background:\"#07070f\",overflowY:\"auto\",overflowX:\"hidden\",\n      WebkitOverflowScrolling:\"touch\",fontFamily:\"'Exo 2',sans-serif\"}}>\n      <style>{GS}</style>\n      <div style={{position:\"fixed\",inset:0,pointerEvents:\"none\",\n        background:\"radial-gradient(ellipse at 30% 20%,#AA00FF11 0%,transparent 55%),radial-gradient(ellipse at 80% 80%,#FF00550d 0%,transparent 50%)\"}} />\n\n      <div style={{position:\"relative\",width:\"100%\",maxWidth:480,margin:\"0 auto\",zIndex:1,\n        padding:\"max(env(safe-area-inset-top,0px),20px) clamp(16px,5vw,28px) clamp(28px,8vw,48px)\"}}>\n        {/* Logo */}\n        <div style={{display:\"flex\",justifyContent:\"center\",marginBottom:12}}>\n          <div style={{width:\"clamp(72px,18vw,100px)\",height:\"clamp(72px,18vw,100px)\",borderRadius:22,overflow:\"hidden\",\n            boxShadow:\"0 0 50px #AA00FF66,0 0 100px #FF005522\",border:\"2px solid #ffffff0f\"}}>\n            <img src={LOGO} style={{width:\"100%\",height:\"100%\",objectFit:\"cover\"}}\n              onError={e=>{e.target.style.display=\"none\";e.target.parentNode.style.background=`conic-gradient(${RAINBOW.join(\",\")})`;}} />\n          </div>\n        </div>\n        <h1 style={{fontFamily:\"'Orbitron',monospace\",fontWeight:900,textAlign:\"center\",marginBottom:3,\n          background:`linear-gradient(90deg,${RAINBOW.join(\",\")})`,WebkitBackgroundClip:\"text\",WebkitTextFillColor:\"transparent\",\n          fontSize:\"clamp(17px,5vw,24px)\"}}>CenaSquare</h1>\n        <p style={{textAlign:\"center\",color:\"#ffffff44\",letterSpacing:3,marginBottom:20,\n          fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(8px,2.2vw,10px)\"}}>\n          CONEX\u00c3O \u00b7 DIVERSIDADE \u00b7 COMUNIDADE\n        </p>\n\n        {/* \u2500\u2500 STEP 0: age input \u2500\u2500 */}\n        {step===0 && (\n          <div className=\"fu\">\n            <div style={{background:\"#FF005511\",border:\"1.5px solid #FF005533\",borderRadius:16,\n              padding:\"clamp(14px,3.5vw,18px)\",marginBottom:18,textAlign:\"center\"}}>\n              <div style={{fontSize:\"clamp(28px,7vw,36px)\",marginBottom:8}}>\ud83d\udd1e</div>\n              <h2 style={{fontFamily:\"'Orbitron',monospace\",color:\"#fff\",marginBottom:6,\n                fontSize:\"clamp(12px,3.5vw,16px)\"}}>VERIFICA\u00c7\u00c3O DE IDADE</h2>\n              <p style={{color:\"#ffffffcc\",lineHeight:1.65,fontSize:\"clamp(11px,3vw,13px)\"}}>\n                Esta plataforma \u00e9 <strong style={{color:\"#FF0055\"}}>restrita a maiores de 18 anos</strong>.<br/>\n                Informe sua data de nascimento para continuar.\n              </p>\n            </div>\n            <p style={{textAlign:\"center\",color:\"#ffffff88\",marginBottom:10,fontSize:\"clamp(10px,2.8vw,12px)\"}}>\n              Data de nascimento\n            </p>\n            <div style={{display:\"flex\",gap:8,marginBottom:16}}>\n              <input ref={dayRef} value={day} inputMode=\"numeric\" maxLength={2} placeholder=\"Dia\"\n                onChange={e=>{const v=e.target.value.replace(/\\D/g,\"\").slice(0,2);setDay(v);if(v.length===2)monthRef.current?.focus();}}\n                style={{width:\"clamp(56px,16vw,76px)\",background:\"#ffffff0d\",border:\"1.5px solid #ffffff1a\",borderRadius:13,\n                  padding:\"clamp(12px,3vw,15px) 8px\",color:\"#fff\",fontWeight:700,textAlign:\"center\",\n                  fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(15px,4vw,18px)\"}} />\n              <input ref={monthRef} value={month} inputMode=\"numeric\" maxLength={2} placeholder=\"M\u00eas\"\n                onChange={e=>{const v=e.target.value.replace(/\\D/g,\"\").slice(0,2);setMonth(v);if(v.length===2)yearRef.current?.focus();}}\n                onKeyDown={e=>{if(e.key===\"Backspace\"&&month===\"\"){setDay(d=>d.slice(0,-1));dayRef.current?.focus();}}}\n                style={{width:\"clamp(56px,16vw,76px)\",background:\"#ffffff0d\",border:\"1.5px solid #ffffff1a\",borderRadius:13,\n                  padding:\"clamp(12px,3vw,15px) 8px\",color:\"#fff\",fontWeight:700,textAlign:\"center\",\n                  fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(15px,4vw,18px)\"}} />\n              <input ref={yearRef} value={year} inputMode=\"numeric\" maxLength={4} placeholder=\"Ano\"\n                onChange={e=>{const v=e.target.value.replace(/\\D/g,\"\").slice(0,4);setYear(v);}}\n                onKeyDown={e=>{if(e.key===\"Backspace\"&&year===\"\"){setMonth(m=>m.slice(0,-1));monthRef.current?.focus();}}}\n                style={{flex:1,background:\"#ffffff0d\",border:\"1.5px solid #ffffff1a\",borderRadius:13,\n                  padding:\"clamp(12px,3vw,15px) 8px\",color:\"#fff\",fontWeight:700,textAlign:\"center\",\n                  fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(15px,4vw,18px)\"}} />\n            </div>\n            <Btn onClick={doCheck} color=\"#AA00FF\" style={{width:\"100%\",padding:\"clamp(13px,3.5vw,16px)\"}}\n              disabled={!(day&&month&&year&&year.length===4)}>\n              VERIFICAR IDADE \u2192\n            </Btn>\n            <p style={{textAlign:\"center\",color:\"#ffffff33\",marginTop:11,lineHeight:1.55,\n              fontSize:\"clamp(9px,2.4vw,10px)\"}}>\n              Dados verificados localmente \u00b7 LGPD \u00b7 ECA \u00b7 Marco Civil da Internet\n            </p>\n          </div>\n        )}\n\n        {/* \u2500\u2500 STEP 1: full terms \u2500\u2500 */}\n        {step===1 && (\n          <div className=\"fu\">\n            <div style={{background:\"#00E67610\",border:\"1.5px solid #00E67633\",borderRadius:11,\n              padding:\"9px 13px\",marginBottom:12,display:\"flex\",gap:8,alignItems:\"center\"}}>\n              <span style={{fontSize:16}}>\u2705</span>\n              <span style={{color:\"#00E676\",fontWeight:600,fontSize:\"clamp(11px,3vw,13px)\"}}>\n                Idade verificada \u2014 leia e aceite os termos abaixo\n              </span>\n            </div>\n            {/* Scrollable legal terms */}\n            <div ref={scrollRef}\n              onScroll={e=>{const el=e.target;if(el.scrollHeight-el.scrollTop-el.clientHeight<30)setAllRead(true);}}\n              style={{background:\"#ffffff06\",border:\"1.5px solid #ffffff0f\",borderRadius:14,\n                height:\"clamp(190px,38vh,270px)\",overflowY:\"auto\",padding:\"13px 15px\",marginBottom:12}}>\n              {TERM_SECS.map(([t,d])=>(\n                <div key={t} style={{marginBottom:14}}>\n                  <p style={{fontFamily:\"'Orbitron',monospace\",color:\"#AA00FF\",marginBottom:5,letterSpacing:.5,\n                    fontSize:\"clamp(9px,2.3vw,10px)\"}}>{t}</p>\n                  <p style={{color:\"#ffffffbb\",lineHeight:1.65,fontSize:\"clamp(10px,2.8vw,12px)\"}}>{d}</p>\n                </div>\n              ))}\n              <div style={{height:16}} />\n            </div>\n            {!allRead && (\n              <p style={{textAlign:\"center\",color:\"#FFD700\",marginBottom:10,fontSize:\"clamp(10px,2.8vw,12px)\"}}>\n                \u2b07 Role at\u00e9 o final para habilitar a confirma\u00e7\u00e3o\n              </p>\n            )}\n            {/* Checkbox \u00fanico */}\n            <label style={{display:\"flex\",alignItems:\"flex-start\",gap:12,padding:\"clamp(12px,3.5vw,16px)\",borderRadius:13,cursor:allRead?\"pointer\":\"not-allowed\",\n              opacity:allRead?1:.45,transition:\"all .2s\",marginBottom:14,\n              background:chk.t1?\"#AA00FF12\":\"#ffffff06\",\n              border:`1.5px solid ${chk.t1?\"#AA00FF55\":\"#ffffff0f\"}`}}>\n              <div style={{marginTop:2,flexShrink:0}}>\n                <input type=\"checkbox\" checked={chk.t1} disabled={!allRead}\n                  onChange={e=>setChk({t1:e.target.checked,t2:e.target.checked,t3:e.target.checked,t4:e.target.checked,t5:e.target.checked})}\n                  style={{accentColor:\"#AA00FF\",width:20,height:20,cursor:allRead?\"pointer\":\"not-allowed\"}} />\n              </div>\n              <span style={{fontSize:\"clamp(11px,3vw,13px)\",color:\"#ffffffdd\",lineHeight:1.6}}>{UNIFIED_LABEL}</span>\n            </label>\n            <Btn onClick={()=>canGo&&onPass()} color=\"#AA00FF\" style={{width:\"100%\",padding:\"14px\"}} disabled={!canGo}>\n              {canGo ? \"ACEITAR E ENTRAR \ud83c\udf08\" : allRead ? \"Marque o termo acima para continuar\" : \"Role os termos at\u00e9 o final \u2b07\"}\n            </Btn>\n          </div>\n        )}\n\n        {/* \u2500\u2500 STEP 2: blocked \u2500\u2500 */}\n        {step===2 && (\n          <div className=\"fu\" style={{textAlign:\"center\"}}>\n            <div style={{fontSize:\"clamp(48px,13vw,64px)\",marginBottom:14}}>\ud83d\udeab</div>\n            <h2 style={{fontFamily:\"'Orbitron',monospace\",color:\"#FF0055\",marginBottom:12,\n              fontSize:\"clamp(14px,4vw,18px)\"}}>ACESSO NEGADO</h2>\n            <div style={{background:\"#FF005511\",border:\"1.5px solid #FF005533\",borderRadius:14,\n              padding:\"clamp(14px,4vw,18px)\",marginBottom:16}}>\n              <p style={{color:\"#ffffffcc\",lineHeight:1.7,fontSize:\"clamp(12px,3.5vw,14px)\"}}>\n                De acordo com o <strong style={{color:\"#FF0055\"}}>Estatuto da Crian\u00e7a e do Adolescente (ECA)</strong> e\n                o <strong style={{color:\"#FF0055\"}}>Art. 234 do C\u00f3digo Penal brasileiro</strong>, o acesso a este\n                conte\u00fado \u00e9 <strong style={{color:\"#FF0055\"}}>proibido para menores de 18 anos</strong>.\n              </p>\n            </div>\n            <Btn onClick={()=>{setStep(0);setDay(\"\");setMonth(\"\");setYear(\"\");}} color=\"#ffffff44\" outline style={{width:\"100%\"}}>\n              \u2190 Tentar novamente\n            </Btn>\n          </div>\n        )}\n      </div>\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 LOGIN \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction LoginScr({ onLogin, onSignup, apiLogin }) {\n  const [user,   setUser]   = useState(\"\");\n  const [pass,   setPass]   = useState(\"\");\n  const [keep,   setKeep]   = useState(true);   // manter logado\n  const [err,    setErr]    = useState(\"\");\n  const [load,   setLoad]   = useState(false);\n\n  // ao montar, tenta restaurar sess\u00e3o salva\n  useEffect(() => {\n    try {\n      const saved = localStorage.getItem(\"csq_session\");\n      if (saved) {\n        const u = JSON.parse(saved);\n        if (u && u.username) onLogin(u);\n      }\n    } catch(_) {}\n  }, []);\n\n  const go = async () => {\n    setLoad(true); setErr(\"\");\n    try {\n      const u = await apiLogin(user, pass);\n      if (keep) {\n        try { localStorage.setItem(\"csq_session\", JSON.stringify(u)); } catch(_) {}\n      } else {\n        try { localStorage.removeItem(\"csq_session\"); } catch(_) {}\n      }\n      onLogin(u);\n    } catch(e) {\n      setErr(e.message || \"Credenciais inv\u00e1lidas\");\n    } finally { setLoad(false); }\n  };\n\n  return (\n    <div style={{position:\"fixed\",inset:0,background:\"#07070f\",display:\"flex\",flexDirection:\"column\",\n      alignItems:\"center\",justifyContent:\"center\",padding:\"clamp(20px,5vw,32px)\",\n      fontFamily:\"'Exo 2',sans-serif\",overflowY:\"auto\",WebkitOverflowScrolling:\"touch\"}}>\n      <style>{GS}</style>\n      <div style={{position:\"fixed\",inset:0,pointerEvents:\"none\",background:\"radial-gradient(ellipse at 40% 25%,#AA00FF11,transparent 55%),radial-gradient(ellipse at 75% 80%,#FF00550d,transparent 50%)\"}} />\n      <div style={{position:\"relative\",width:\"100%\",maxWidth:380,textAlign:\"center\"}}>\n        <div style={{display:\"flex\",justifyContent:\"center\",marginBottom:18}}>\n          <div style={{width:\"clamp(80px,20vw,110px)\",height:\"clamp(80px,20vw,110px)\",borderRadius:22,overflow:\"hidden\",\n            boxShadow:\"0 0 50px #AA00FF66\",border:\"2px solid #ffffff0f\"}}>\n            <img src={LOGO} style={{width:\"100%\",height:\"100%\",objectFit:\"cover\"}}\n              onError={e=>{e.target.style.display=\"none\";e.target.parentNode.style.background=`conic-gradient(${RAINBOW.join(\",\")})`;}} />\n          </div>\n        </div>\n        <h1 style={{fontFamily:\"'Orbitron',monospace\",fontWeight:900,marginBottom:4,\n          background:`linear-gradient(90deg,${RAINBOW.join(\",\")})`,WebkitBackgroundClip:\"text\",WebkitTextFillColor:\"transparent\",\n          fontSize:\"clamp(18px,5vw,26px)\"}}>CenaSquare</h1>\n        <p style={{color:\"#ffffff55\",letterSpacing:3,marginBottom:28,fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(9px,2.4vw,11px)\"}}>\n          CONEX\u00c3O \u00b7 DIVERSIDADE \u00b7 COMUNIDADE\n        </p>\n        <div style={{display:\"flex\",flexDirection:\"column\",gap:11}}>\n          <input value={user} onChange={e=>setUser(e.target.value)} placeholder=\"Usu\u00e1rio\"\n            autoCapitalize=\"none\" autoCorrect=\"off\" autoComplete=\"username\"\n            style={{background:\"#ffffff0d\",border:\"1.5px solid #ffffff1a\",borderRadius:13,\n              padding:\"clamp(12px,3vw,15px) 16px\",color:\"#fff\",fontSize:\"clamp(14px,3.5vw,16px)\"}} />\n          <input value={pass} onChange={e=>setPass(e.target.value)} type=\"password\"\n            onKeyDown={e=>e.key===\"Enter\"&&go()} placeholder=\"Senha\" autoComplete=\"current-password\"\n            style={{background:\"#ffffff0d\",border:\"1.5px solid #ffffff1a\",borderRadius:13,\n              padding:\"clamp(12px,3vw,15px) 16px\",color:\"#fff\",fontSize:\"clamp(14px,3.5vw,16px)\"}} />\n\n          {/* Manter logado */}\n          <label style={{display:\"flex\",alignItems:\"center\",gap:10,padding:\"10px 14px\",\n            background:\"#ffffff06\",border:\"1.5px solid #ffffff0f\",borderRadius:12,cursor:\"pointer\",\n            textAlign:\"left\"}}>\n            <input type=\"checkbox\" checked={keep} onChange={e=>setKeep(e.target.checked)}\n              style={{accentColor:\"#AA00FF\",width:18,height:18,flexShrink:0,cursor:\"pointer\"}} />\n            <div>\n              <div style={{fontSize:\"clamp(12px,3.5vw,14px)\",color:\"#fff\",fontWeight:600}}>Manter logado</div>\n              <div style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff55\",marginTop:1}}>Sua sess\u00e3o ser\u00e1 salva neste dispositivo</div>\n            </div>\n          </label>\n\n          {err && <p style={{color:\"#FF0055\",fontSize:\"clamp(11px,3vw,13px)\",textAlign:\"center\"}}>{err}</p>}\n          <p style={{color:\"#ffffff33\",fontSize:\"clamp(9px,2.4vw,10px)\"}}>user/123 \u00b7 admin/admin123 \u00b7 lucas_bsb/123</p>\n          <Btn onClick={go} color=\"#AA00FF\" style={{width:\"100%\",padding:\"clamp(13px,3.5vw,16px)\"}} disabled={load}>\n            {load?\"\u23f3 Entrando...\":\"ENTRAR\"}\n          </Btn>\n          <button onClick={onSignup} style={{background:\"#ffffff08\",border:\"1.5px solid #ffffff13\",borderRadius:13,\n            padding:\"clamp(12px,3vw,14px)\",color:\"#ffffffaa\",fontSize:\"clamp(13px,3.5vw,15px)\"}}>\n            Criar conta com convite \ud83d\udce9\n          </button>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 SIGNUP \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction SignupScr({ onBack, onDone }) {\n  const [step,setStep]=useState(0);const [code,setCode]=useState(\"\");const [f,setF]=useState({username:\"\",email:\"\",password:\"\"});\n  return (\n    <div style={{background:\"#07070f\",minHeight:\"100dvh\",display:\"flex\",flexDirection:\"column\",\n      padding:\"clamp(16px,4vw,24px)\",fontFamily:\"'Exo 2',sans-serif\",color:\"#fff\",overflowY:\"auto\"}}>\n      <style>{GS}</style>\n      <button onClick={onBack} style={{color:\"#ffffffaa\",fontSize:\"clamp(13px,3.5vw,15px)\",\n        marginTop:\"max(env(safe-area-inset-top,0px),16px)\",marginBottom:14,textAlign:\"left\"}}>\u2190 voltar</button>\n      <div style={{display:\"flex\",justifyContent:\"center\",marginBottom:12}}>\n        <div style={{width:60,height:60,borderRadius:15,overflow:\"hidden\",boxShadow:\"0 0 22px #AA00FF55\",border:\"2px solid #ffffff0f\"}}>\n          <img src={LOGO} style={{width:\"100%\",height:\"100%\",objectFit:\"cover\"}} onError={e=>e.target.style.display=\"none\"} />\n        </div>\n      </div>\n      <h2 style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(14px,4.5vw,18px)\",marginBottom:4,textAlign:\"center\"}}>Criar Conta</h2>\n      <p style={{color:\"#ffffff55\",fontSize:\"clamp(10px,3vw,12px)\",marginBottom:18,textAlign:\"center\"}}>Apenas por convite de um membro</p>\n      {step===0 && (\n        <div style={{display:\"flex\",flexDirection:\"column\",gap:11}}>\n          <input value={code} onChange={e=>setCode(e.target.value)} placeholder=\"C\u00f3digo de convite\"\n            style={{background:\"#ffffff0d\",border:`1.5px solid ${code.length>4?\"#00E676\":\"#ffffff18\"}`,borderRadius:12,\n              padding:\"clamp(12px,3vw,15px) 16px\",color:\"#fff\",fontSize:\"clamp(14px,3.5vw,16px)\"}} />\n          <Btn onClick={()=>code.length>3&&setStep(1)} color={code.length>3?\"#00E676\":\"#ffffff22\"} style={{width:\"100%\"}}>VERIFICAR</Btn>\n        </div>\n      )}\n      {step===1 && (\n        <div style={{display:\"flex\",flexDirection:\"column\",gap:10}} className=\"fu\">\n          <div style={{padding:10,background:\"#00E67612\",border:\"1.5px solid #00E67633\",borderRadius:10,color:\"#00E676\",fontSize:\"clamp(11px,3vw,13px)\",marginBottom:4}}>\u2713 Convite v\u00e1lido! Bem-vinde \ud83c\udf08</div>\n          {[[\"username\",\"Nome de usu\u00e1rio\",\"text\"],[\"email\",\"Email\",\"email\"],[\"password\",\"Senha\",\"password\"]].map(([k,pl,tp])=>(\n            <input key={k} value={f[k]} onChange={e=>setF(x=>({...x,[k]:e.target.value}))} placeholder={pl} type={tp}\n              autoCapitalize={k===\"email\"?\"none\":\"sentences\"} autoCorrect=\"off\"\n              style={{background:\"#ffffff0d\",border:\"1.5px solid #ffffff18\",borderRadius:12,\n                padding:\"clamp(12px,3vw,15px) 16px\",color:\"#fff\",fontSize:\"clamp(14px,3.5vw,16px)\"}} />\n          ))}\n          <div style={{padding:\"10px 13px\",background:\"#AA00FF0a\",border:\"1.5px solid #AA00FF1a\",borderRadius:11,\n            fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffffaa\",lineHeight:1.5}}>\n            \u2139\ufe0f Ao criar sua conta, voc\u00ea confirma ter aceito os Termos de Uso e LGPD na tela anterior.\n          </div>\n          <Btn onClick={()=>f.username&&f.email&&f.password&&setStep(2)} color=\"#AA00FF\" style={{width:\"100%\"}} disabled={!f.username||!f.email||!f.password}>CRIAR CONTA</Btn>\n        </div>\n      )}\n      {step===2 && (\n        <div style={{textAlign:\"center\",paddingTop:\"clamp(24px,6vw,40px)\"}} className=\"fu\">\n          <div style={{fontSize:\"clamp(44px,12vw,60px)\",marginBottom:14}}>\ud83c\udf89</div>\n          <h3 style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(14px,4vw,18px)\",marginBottom:10}}>Bem-vinde!</h3>\n          <p style={{color:\"#ffffffaa\",lineHeight:1.7,marginBottom:22,fontSize:\"clamp(12px,3.5vw,14px)\"}}>Voc\u00ea faz parte da CenaSquare agora.<br/>Seja voc\u00ea mesmo, seja livre, seja amor. \ud83d\udc9c</p>\n          <Btn onClick={onDone} color=\"#FF0055\" style={{width:\"100%\"}}>ENTRAR NA CENA \ud83c\udf08</Btn>\n        </div>\n      )}\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 HOPE SCREEN \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction HopeScr({ msg }) {\n  return (\n    <div style={{background:\"#07070f\",minHeight:\"100dvh\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",\n      padding:\"clamp(28px,7vw,48px)\",fontFamily:\"'Exo 2',sans-serif\",position:\"relative\",overflow:\"hidden\"}}>\n      <style>{GS}</style>\n      <div style={{position:\"absolute\",inset:0}}>\n        {RAINBOW.map((c,i)=><div key={i} style={{position:\"absolute\",width:\"200%\",height:\"200%\",top:`${i*13-15}%`,left:\"-50%\",background:`linear-gradient(transparent,${c}06,transparent)`,transform:`rotate(${i*30}deg)`}} />)}\n      </div>\n      <div className=\"hp\" style={{textAlign:\"center\",position:\"relative\",zIndex:1}}>\n        <div style={{display:\"flex\",justifyContent:\"center\",marginBottom:20}}>\n          <div style={{width:\"clamp(78px,20vw,100px)\",height:\"clamp(78px,20vw,100px)\",borderRadius:22,overflow:\"hidden\",boxShadow:\"0 0 44px #AA00FF88\",border:\"2px solid #ffffff0f\"}}>\n            <img src={LOGO} style={{width:\"100%\",height:\"100%\",objectFit:\"cover\"}} onError={e=>e.target.style.display=\"none\"} />\n          </div>\n        </div>\n        <p style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(8px,2.5vw,11px)\",letterSpacing:3,color:\"#ffffff33\",marginBottom:14}}>CENA SQUARE</p>\n        <p style={{fontSize:\"clamp(16px,4.5vw,22px)\",fontWeight:600,lineHeight:1.75,maxWidth:\"min(290px,80vw)\",color:\"#fff\",textShadow:\"0 0 40px #AA00FF99\",margin:\"0 auto\"}}>{msg}</p>\n      </div>\n    </div>\n  );\n}\n\n\n// \u2550\u2550\u2550 FEED \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction FeedView({\n  posts, likes, setLikes, onTicket, onStory, isAdmin,\n  onFlag, onBlock, mode, onUserProfile, stories, onNewStory, me,\n  onDeletePost, onEditPost, onAddComment, onDeleteComment,\n  following, onFollow, pullY, refreshing\n}) {\n  const THRESH = 72;\n  const progress = Math.min(pullY / THRESH, 1); // 0\u21921\n\n  return (\n    <div style={{position:\"relative\"}}>\n\n      {/* \u2500\u2500 Pull-to-refresh indicator \u2500\u2500 */}\n      <div style={{\n        overflow:\"hidden\",\n        height: refreshing ? 56 : Math.max(0, pullY * 0.85),\n        transition: refreshing ? \"height .25s ease\" : pullY===0 ? \"height .3s ease\" : \"none\",\n        display:\"flex\",alignItems:\"center\",justifyContent:\"center\",\n      }}>\n        <div style={{\n          display:\"flex\",flexDirection:\"column\",alignItems:\"center\",gap:4,\n          opacity: refreshing ? 1 : progress,\n          transform:`scale(${0.6 + progress*0.4})`,\n          transition: refreshing ? \"all .25s ease\" : \"none\",\n        }}>\n          {refreshing ? (\n            // Spinner animado\n            <svg width={28} height={28} viewBox=\"0 0 28 28\" style={{animation:\"spin 0.8s linear infinite\"}}>\n              <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>\n              <circle cx=\"14\" cy=\"14\" r=\"11\" fill=\"none\" stroke=\"#AA00FF33\" strokeWidth=\"3\"/>\n              <path d=\"M14 3 a11 11 0 0 1 11 11\" fill=\"none\" stroke=\"#AA00FF\" strokeWidth=\"3\" strokeLinecap=\"round\"/>\n            </svg>\n          ) : (\n            // Seta que rotaciona conforme puxa\n            <svg width={26} height={26} viewBox=\"0 0 26 26\"\n              style={{transform:`rotate(${Math.min(progress*180,180)}deg)`,transition:\"none\"}}>\n              <circle cx=\"13\" cy=\"13\" r=\"11\" fill=\"none\"\n                stroke={progress>=1?\"#AA00FF\":\"#ffffff33\"} strokeWidth=\"2.5\"\n                strokeDasharray={`${2*Math.PI*11}`}\n                strokeDashoffset={`${2*Math.PI*11*(1-progress)}`}\n                strokeLinecap=\"round\"/>\n              <path d=\"M13 6 L13 17 M9 14 L13 18 L17 14\" fill=\"none\"\n                stroke={progress>=1?\"#AA00FF\":\"#ffffff55\"} strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\"/>\n            </svg>\n          )}\n          <span style={{\n            fontSize:\"clamp(10px,2.8vw,11px)\",fontFamily:\"'Orbitron',monospace\",letterSpacing:.5,\n            color: progress>=1?\"#AA00FF\":\"#ffffff55\",\n          }}>\n            {refreshing?\"ATUALIZANDO...\":progress>=1?\"SOLTE PARA ATUALIZAR\":\"PUXE PARA ATUALIZAR\"}\n          </span>\n        </div>\n      </div>\n\n      {/* \u2500\u2500 Stories row \u2500\u2500 */}\n      <div style={{display:\"flex\",gap:\"clamp(8px,2.5vw,12px)\",padding:\"0 12px 14px\",overflowX:\"auto\",scrollbarWidth:\"none\",WebkitOverflowScrolling:\"touch\"}}>\n        {stories.map((s)=>(\n          <div key={s.id}\n            style={{display:\"flex\",flexDirection:\"column\",alignItems:\"center\",gap:4,flexShrink:0,cursor:\"pointer\",WebkitTapHighlightColor:\"transparent\"}}\n            onClick={()=>{ if(s.own && !s.img){ onNewStory(); } else { onStory(s); } }}>\n            <div style={{position:\"relative\",width:\"clamp(56px,14vw,64px)\",height:\"clamp(56px,14vw,64px)\"}}>\n              <div style={{\n                width:\"100%\",height:\"100%\",borderRadius:\"50%\",flexShrink:0,\n                background: s.seen ? \"#ffffff18\" : `conic-gradient(${RAINBOW.join(\",\")})`,\n                padding: s.seen ? 2 : 2.5,\n                display:\"flex\",alignItems:\"center\",justifyContent:\"center\"\n              }}>\n                <div style={{background:\"#07070f\",borderRadius:\"50%\",padding:2,width:\"100%\",height:\"100%\",\n                  display:\"flex\",alignItems:\"center\",justifyContent:\"center\",overflow:\"hidden\"}}>\n                  {s.img\n                    ? <img src={s.img} style={{width:\"100%\",height:\"100%\",borderRadius:\"50%\",objectFit:\"cover\",display:\"block\"}}\n                        onError={e=>e.target.style.display=\"none\"} />\n                    : <div style={{width:\"100%\",height:\"100%\",borderRadius:\"50%\",\n                        background:`linear-gradient(135deg,${rc(s.av)},${rc2(s.av)})`,\n                        display:\"flex\",alignItems:\"center\",justifyContent:\"center\",\n                        fontSize:\"clamp(14px,4vw,18px)\",fontWeight:700,color:\"#fff\",fontFamily:\"'Orbitron',monospace\"}}>\n                        {s.av.slice(0,2)}\n                      </div>\n                  }\n                </div>\n              </div>\n              {s.own && (\n                <div onClick={e=>{e.stopPropagation();onNewStory();}}\n                  style={{position:\"absolute\",bottom:-1,right:-1,\n                    width:\"clamp(18px,5vw,22px)\",height:\"clamp(18px,5vw,22px)\",\n                    borderRadius:\"50%\",background:\"linear-gradient(135deg,#AA00FF,#FF0055)\",\n                    border:\"2.5px solid #07070f\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",\n                    fontSize:\"clamp(11px,3vw,14px)\",color:\"#fff\",fontWeight:700,lineHeight:1,cursor:\"pointer\",\n                    boxShadow:\"0 0 10px #AA00FF88\"}}>+</div>\n              )}\n            </div>\n            <span style={{fontSize:\"clamp(9px,2.4vw,10px)\",color:\"#ffffffaa\",width:\"clamp(52px,14vw,64px)\",textAlign:\"center\",overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\"}}>{s.usr}</span>\n          </div>\n        ))}\n      </div>\n\n      {/* Mode banner */}\n      <div style={{margin:\"0 12px 12px\",padding:\"9px 14px\",borderRadius:12,display:\"flex\",gap:8,alignItems:\"center\",\n        background:mode===\"wolf\"?\"linear-gradient(90deg,#FF005512,#AA00FF12)\":\"#ffffff07\",\n        border:`1.5px solid ${mode===\"wolf\"?\"#FF005525\":\"#ffffff10\"}`}}>\n        <span style={{fontSize:\"clamp(13px,3.5vw,16px)\"}}>{mode===\"angel\"?\"\ud83d\ude07\":\"\ud83d\udc8b\"}</span>\n        <span style={{fontSize:\"clamp(11px,3vw,13px)\",color:\"#ffffffcc\",fontWeight:600}}>\n          {mode===\"angel\"?\"Modo Anjo \u2014 eventos e comunidade\":\"Modo LUST \u2014 conte\u00fado adulto ativado\"}\n        </span>\n      </div>\n\n      {/* \u2500\u2500 Empty state: n\u00e3o segue ningu\u00e9m \u2500\u2500 */}\n      {posts.length===0 && (\n        <div style={{padding:\"clamp(28px,8vw,44px) 24px\",textAlign:\"center\"}}>\n          <div style={{fontSize:\"clamp(44px,12vw,60px)\",marginBottom:14}}>\ud83c\udf08</div>\n          <h3 style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(13px,3.5vw,16px)\",color:\"#fff\",marginBottom:10}}>\n            Seu feed est\u00e1 vazio\n          </h3>\n          <p style={{fontSize:\"clamp(12px,3.5vw,14px)\",color:\"#ffffffaa\",lineHeight:1.7,marginBottom:20}}>\n            Siga outros perfis para ver as publica\u00e7\u00f5es deles aqui.\n          </p>\n          {/* Sugest\u00f5es r\u00e1pidas */}\n          <div style={{display:\"flex\",flexDirection:\"column\",gap:10}}>\n            {Object.entries(USERS).filter(([k])=>k!==me?.username).slice(0,3).map(([uid,u])=>(\n              <div key={uid} style={{display:\"flex\",alignItems:\"center\",gap:11,padding:\"11px 14px\",\n                background:\"#0c0c1a\",b #fff\"}}>\n          {(p.lk+(liked?1:0)).toLocaleString()} curtidas\n          {comments.length>0&&<span style={{marginLeft:10,color:\"#ffffff55\",fontWeight:400,fontSize:\"clamp(11px,3vw,13px)\"}}>{comments.length} coment\u00e1rio{comments.length!==1?\"s\":\"\"}</span>}\n        </div>\n\n        {/* Caption */}\n        <div style={{fontSize:\"clamp(12px,3.5vw,13px)\",lineHeight:1.55,marginBottom:\"clamp(6px,2vw,9px)\"}}>\n          <span style={{fontWeight:700,color:\"#fff\"}}>{p.usr} </span>\n          <span style={{color:\"#ffffffcc\"}}>{exp?p.cap:p.cap.slice(0,68)}{!exp&&p.cap.length>68?\"...\":\"\"}</span>\n          {p.cap.length>68 && (\n            <button onClick={()=>setExp(e=>!e)} style={{color:\"#ffffff77\",fontSize:\"clamp(11px,3vw,12px)\",marginLeft:4}}>\n              {exp?\"menos\":\"mais\"}\n            </button>\n          )}\n        </div>\n\n        {/* Comments section */}\n        {showCmts && (\n          <div style={{borderTop:\"1px solid #ffffff09\",paddingTop:\"clamp(8px,2.5vw,11px)\"}}>\n            {/* Existing comments */}\n            {comments.length===0&&<p style={{color:\"#ffffff44\",fontSize:\"clamp(11px,3vw,12px)\",marginBottom:9}}>Nenhum coment\u00e1rio ainda. Seja o primeiro! \ud83d\udcac</p>}\n            {comments.map(c=>(\n              <div key={c.id} style={{display:\"flex\",alignItems:\"flex-start\",gap:8,marginBottom:\"clamp(7px,2vw,10px)\"}}>\n                <Av init={c.av} size=\"clamp(26px,7vw,32px)\" />\n                <div style={{flex:1,minWidth:0,background:\"#ffffff07\",borderRadius:11,padding:\"7px 10px\"}}>\n                  <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",gap:6,marginBottom:2}}>\n                    <span style={{fontWeight:700,fontSize:\"clamp(11px,3vw,12px)\",color:\"#fff\"}}>{c.usr}</span>\n                    <div style={{display:\"flex\",alignItems:\"center\",gap:6,flexShrink:0}}>\n                      <span style={{fontSize:\"clamp(9px,2.4vw,10px)\",color:\"#ffffff44\"}}>{c.tm}</span>\n                      {/* deletar coment\u00e1rio: dono do coment\u00e1rio ou dono do post ou admin */}\n                      {(me?.username===c.uid||isOwn||isAdmin) && (\n                        <button onClick={()=>onDeleteComment(c.id)}\n                          style={{color:\"#FF005577\",fontSize:\"clamp(11px,3vw,13px)\",lineHeight:1,padding:\"1px 3px\",\n                            borderRadius:6,transition:\"color .2s\"}}\n                          title=\"Deletar coment\u00e1rio\">\ud83d\uddd1\ufe0f</button>\n                      )}\n                    </div>\n                  </div>\n                  <p style={{fontSize:\"clamp(11px,3vw,13px)\",color:\"#ffffffcc\",lineHeight:1.5}}>{c.text}</p>\n                </div>\n              </div>\n            ))}\n            {/* Add comment */}\n            <div style={{display:\"flex\",gap:7,alignItems:\"center\",marginTop:4,marginBottom:4}}>\n              <Av init={me?.av||\"EU\"} size=\"clamp(26px,7vw,30px)\" img={me?.img} />\n              <div style={{flex:1,display:\"flex\",gap:6,alignItems:\"center\"}}>\n                <input value={newCmt} onChange={e=>setNewCmt(e.target.value)}\n                  onKeyDown={e=>e.key===\"Enter\"&&submitComment()}\n                  placeholder=\"Adicionar coment\u00e1rio\u2026\"\n                  style={{flex:1,background:\"#ffffff0d\",border:\"1.5px solid #ffffff18\",borderRadius:20,\n                    padding:\"clamp(7px,2vw,9px) clamp(11px,3vw,14px)\",color:\"#fff\",\n                    fontSize:\"clamp(12px,3.5vw,14px)\"}} />\n                <button onClick={submitComment}\n                  style={{background:newCmt.trim()?\"linear-gradient(135deg,#AA00FF,#FF0055)\":\"#ffffff0d\",\n                    border:\"none\",borderRadius:\"50%\",\n                    width:\"clamp(30px,8vw,36px)\",height:\"clamp(30px,8vw,36px)\",\n                    display:\"flex\",alignItems:\"center\",justifyContent:\"center\",\n                    fontSize:\"clamp(13px,3.5vw,16px)\",color:\"#fff\",transition:\"all .2s\",flexShrink:0}}>\u2191</button>\n              </div>\n            </div>\n          </div>\n        )}\n      </div>\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 FLIRT VIEW \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction FlirtView({ nearby, gps, onStartChat, onLike }) {\n  const [q,setQ]=useState(\"\");const [filter,setFilter]=useState(\"todos\");const [sel,setSel]=useState(null);\n  const filtered = nearby.filter(u=>!u.bl).filter(u=>{\n    const mq=!q||(u.sn+u.bio+(u.int||\"\")).toLowerCase().includes(q.toLowerCase());\n    const mf=filter===\"todos\"||(filter===\"online\"&&u.on)||(filter===\"perto\"&&(u.distKm||999)<2);\n    return mq&&mf;\n  });\n  return (\n    <div style={{padding:\"0 12px clamp(12px,3.5vw,16px)\"}}>\n      <div style={{marginBottom:12}}>\n        <h2 style={{fontFamily:\"'Orbitron',monospace\",fontWeight:900,marginBottom:3,lineHeight:1.2,fontSize:\"clamp(14px,4vw,18px)\"}}>\n          {[...\"FLERTE\"].map((c,i)=><span key={i} style={{color:RAINBOW[i%RAINBOW.length],textShadow:`0 0 8px ${RAINBOW[i%RAINBOW.length]}88`}}>{c}</span>)}\n          <span style={{color:\"#ffffff44\",fontSize:\"clamp(10px,2.8vw,13px)\",fontWeight:400,marginLeft:8}}>\u00b7 conex\u00e3o & paquera</span>\n        </h2>\n        {!gps && (\n          <div style={{padding:\"7px 12px\",background:\"#FFD70010\",border:\"1.5px solid #FFD70022\",borderRadius:9,display:\"flex\",gap:7,alignItems:\"center\",marginTop:8}}>\n            <span style={{fontSize:14}}>\ud83d\udce1</span>\n            <span style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#FFD700\"}}>Ative o GPS nas configura\u00e7\u00f5es para ver a dist\u00e2ncia real</span>\n          </div>\n        )}\n      </div>\n      {/* Search */}\n      <div style={{position:\"relative\",marginBottom:10}}>\n        <span style={{position:\"absolute\",left:13,top:\"50%\",transform:\"translateY(-50%)\",fontSize:15,pointerEvents:\"none\"}}>\ud83d\udd0d</span>\n        <input value={q} onChange={e=>setQ(e.target.value)} placeholder=\"Nome, interesse, bio\u2026\"\n          style={{width:\"100%\",background:\"#ffffff0d\",border:\"1.5px solid #ffffff1a\",borderRadius:14,\n            padding:\"clamp(10px,3vw,12px) 14px clamp(10px,3vw,12px) 38px\",color:\"#fff\",fontSize:\"clamp(12px,3.5vw,14px)\"}} />\n        {q && <button onClick={()=>setQ(\"\")} style={{position:\"absolute\",right:11,top:\"50%\",transform:\"translateY(-50%)\",color:\"#ffffff55\",fontSize:15}}>\u2715</button>}\n      </div>\n      {/* Filters */}\n      <div style={{display:\"flex\",gap:7,marginBottom:12,overflowX:\"auto\",scrollbarWidth:\"none\"}}>\n        {[[\"todos\",\"\ud83c\udf08 Todos\"],[\"online\",\"\ud83d\udfe2 Online\"],[\"perto\",\"\ud83d\udccd <2km\"]].map(([k,l])=>(\n          <button key={k} onClick={()=>setFilter(k)} style={{flexShrink:0,\n            background:filter===k?`linear-gradient(135deg,${RAINBOW[0]},${RAINBOW[5]})`:\"#ffffff0a\",\n            border:`1.5px solid ${filter===k?\"#FF005555\":\"#ffffff13\"}`,borderRadius:20,\n            padding:\"clamp(6px,2vw,8px) clamp(12px,3.5vw,16px)\",\n            color:filter===k?\"#fff\":\"#ffffffaa\",fontSize:\"clamp(10px,2.8vw,12px)\",fontWeight:filter===k?700:400}}>\n            {l}\n          </button>\n        ))}\n      </div>\n      {/* Stats */}\n      <div style={{display:\"flex\",gap:8,marginBottom:14,padding:\"clamp(9px,2.5vw,11px) 14px\",background:\"#ffffff06\",borderRadius:12,border:\"1.5px solid #ffffff0a\"}}>\n        {[[filtered.filter(p=>p.on).length,\"\ud83d\udfe2\",\"online\"],[filtered.length,\"\ud83d\udc65\",\"perfis\"],[filtered.filter(p=>p.lk).length,\"\u2764\ufe0f\",\"curtidos\"]].map(([n,ic,lb])=>(\n          <div key={lb} style={{flex:1,textAlign:\"center\"}}>\n            <div style={{fontSize:\"clamp(13px,3.5vw,16px)\",fontWeight:700,color:\"#fff\"}}>{ic} {n}</div>\n            <div style={{fontSize:\"clamp(8px,2.2vw,10px)\",color:\"#ffffff55\",fontFamily:\"'Orbitron',monospace\",letterSpacing:.3}}>{lb.toUpperCase()}</div>\n          </div>\n        ))}\n      </div>\n      {/* Grid */}\n      {filtered.length===0\n        ? <div style={{textAlign:\"center\",padding:\"clamp(28px,8vw,44px) 20px\"}}>\n            <div style={{fontSize:\"clamp(32px,9vw,48px)\",marginBottom:10}}>\ud83d\udc94</div>\n            <p style={{color:\"#ffffff66\",fontSize:\"clamp(12px,3.5vw,14px)\"}}>Nenhum perfil encontrado.</p>\n          </div>\n        : <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:\"clamp(8px,2.5vw,12px)\"}}>\n            {filtered.map(p=><FlirtCard key={p.id} profile={p} onSelect={()=>setSel(p)} onLike={e=>{e.stopPropagation();onLike(p.id);}} onChat={()=>onStartChat(p)} />)}\n          </div>\n      }\n      {sel && <FlirtModal profile={sel} onClose={()=>setSel(null)} onChat={()=>{onStartChat(sel);setSel(null);}} onLike={()=>{onLike(sel.id);setSel(p=>({...p,lk:!p.lk}));}} />}\n    </div>\n  );\n}\n\nfunction FlirtCard({ profile:p, onSelect, onLike, onChat }) {\n  return (\n    <div onClick={onSelect}\n      style={{background:\"#0c0c1a\",border:`1.5px solid ${p.lk?\"#FF005533\":\"#ffffff0d\"}`,borderRadius:16,overflow:\"hidden\",cursor:\"pointer\"}}>\n      <div style={{position:\"relative\"}}>\n        <img src={p.p1} alt=\"\" style={{width:\"100%\",aspectRatio:\"1\",objectFit:\"cover\"}}\n          onError={e=>{e.target.src=p.p2;}} />\n        {p.on && <div style={{position:\"absolute\",top:\"clamp(6px,2vw,9px)\",right:\"clamp(6px,2vw,9px)\",\n          width:\"clamp(8px,2.5vw,11px)\",height:\"clamp(8px,2.5vw,11px)\",borderRadius:\"50%\",\n          background:\"#00E676\",border:\"2px solid #0c0c1a\",boxShadow:\"0 0 7px #00E676\"}} />}\n        <div style={{position:\"absolute\",top:\"clamp(6px,2vw,9px)\",left:\"clamp(6px,2vw,9px)\",\n          background:\"#000000bb\",backdropFilter:\"blur(8px)\",borderRadius:8,padding:\"3px clamp(6px,2vw,9px)\",display:\"flex\",alignItems:\"center\",gap:3}}>\n          <span style={{fontSize:\"clamp(8px,2.2vw,10px)\"}}>\ud83d\udccd</span>\n          <span style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(9px,2.5vw,11px)\",fontWeight:700,color:\"#00B4FF\"}}>{p.dist}</span>\n        </div>\n        <div style={{position:\"absolute\",bottom:0,left:0,right:0,background:\"linear-gradient(transparent,#0c0c1a 88%)\",padding:\"clamp(16px,4.5vw,22px) clamp(7px,2vw,10px) clamp(5px,1.5vw,7px)\"}}>\n          <div style={{fontWeight:800,fontSize:\"clamp(11px,3.2vw,14px)\",color:\"#fff\"}}>{p.sn}</div>\n          <div style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffffaa\"}}>{p.age} anos</div>\n        </div>\n      </div>\n      <div style={{padding:\"clamp(6px,2vw,8px) clamp(8px,2.5vw,11px)\",display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",gap:5}}>\n        <p style={{flex:1,fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffffcc\",overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\"}}>{p.bio}</p>\n        <button onClick={onLike} style={{color:p.lk?\"#FF0055\":\"#ffffff55\",fontSize:\"clamp(15px,4.2vw,19px)\",filter:p.lk?\"drop-shadow(0 0 5px #FF0055)\":\"none\",transition:\"all .2s\",flexShrink:0,lineHeight:1}}>\n          {p.lk?\"\u2764\ufe0f\":\"\ud83e\udd0d\"}\n        </button>\n      </div>\n      <div style={{padding:\"0 clamp(7px,2vw,10px) clamp(8px,2.5vw,11px)\"}}>\n        <button onClick={e=>{e.stopPropagation();onChat();}}\n          style={{width:\"100%\",background:\"linear-gradient(90deg,#AA00FF22,#FF005522)\",\n            border:\"1.5px solid #AA00FF33\",borderRadius:9,padding:\"clamp(6px,2vw,8px)\",\n            color:\"#fff\",fontSize:\"clamp(10px,2.8vw,12px)\",fontWeight:600,\n            display:\"flex\",alignItems:\"center\",justifyContent:\"center\",gap:5}}>\n          \ud83d\udcac Enviar mensagem\n        </button>\n      </div>\n    </div>\n  );\n}\n\nfunction FlirtModal({ profile:p, onClose, onChat, onLike }) {\n  const [imgIdx,setImgIdx]=useState(0);const imgs=[p.p1,p.p2];\n  return (\n    <div style={{position:\"fixed\",inset:0,background:\"#000000cc\",zIndex:200,display:\"flex\",alignItems:\"flex-end\"}} onClick={onClose}>\n      <div onClick={e=>e.stopPropagation()} className=\"fu\"\n        style={{background:\"#0e0e1e\",borderRadius:\"22px 22px 0 0\",width:\"100%\",maxWidth:480,margin:\"0 auto\",border:\"1.5px solid #ffffff0a\",overflow:\"hidden\",maxHeight:\"92dvh\",overflowY:\"auto\"}}>\n        <div style={{position:\"relative\"}}>\n          <img src={imgs[imgIdx]} alt=\"\" style={{width:\"100%\",aspectRatio:\"4/3\",objectFit:\"cover\"}}\n            onError={e=>{e.target.src=p.p1;}} />\n          {/* Dots */}\n          <div style={{position:\"absolute\",top:12,left:\"50%\",transform:\"translateX(-50%)\",display:\"flex\",gap:5}}>\n            {imgs.map((_,i)=><div key={i} onClick={()=>setImgIdx(i)} style={{width:\"clamp(6px,1.8vw,8px)\",height:\"clamp(6px,1.8vw,8px)\",borderRadius:\"50%\",background:imgIdx===i?\"#fff\":\"#ffffff55\",cursor:\"pointer\"}} />)}\n          </div>\n          <button onClick={()=>setImgIdx(i=>(i+1)%imgs.length)} style={{position:\"absolute\",right:12,top:\"50%\",transform:\"translateY(-50%)\",background:\"#000000aa\",borderRadius:\"50%\",width:36,height:36,color:\"#fff\",fontSize:18,display:\"flex\",alignItems:\"center\",justifyContent:\"center\"}}>\u203a</button>\n          <button onClick={onClose} style={{position:\"absolute\",top:12,right:12,background:\"#000000aa\",borderRadius:\"50%\",width:32,height:32,color:\"#fff\",fontSize:15,display:\"flex\",alignItems:\"center\",justifyContent:\"center\"}}>\u2715</button>\n          {/* Distance badge */}\n          <div style={{position:\"absolute\",top:12,left:12,background:\"#000000bb\",backdropFilter:\"blur(10px)\",borderRadius:10,padding:\"5px 12px\",display:\"flex\",alignItems:\"center\",gap:5}}>\n            <span style={{fontSize:13}}>\ud83d\udccd</span>\n            <span style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(12px,3.5vw,14px)\",fontWeight:700,color:\"#00B4FF\"}}>{p.dist} de voc\u00ea</span>\n          </div>\n          <div style={{position:\"absolute\",bottom:0,left:0,right:0,background:\"linear-gradient(transparent,#0e0e1e)\",padding:\"clamp(30px,8vw,44px) 16px 14px\"}}>\n            <div style={{fontWeight:900,fontSize:\"clamp(17px,5vw,23px)\",color:\"#fff\"}}>{p.sn}</div>\n            <div style={{fontSize:\"clamp(11px,3.2vw,14px)\",color:\"#ffffffaa\"}}>\n              {p.age} anos \u00b7 {p.on?<span style={{color:\"#00E676\"}}>\ud83d\udfe2 Online</span>:<span style={{color:\"#ffffff44\"}}>\u26ab Offline</span>}\n            </div>\n          </div>\n        </div>\n        <div style={{padding:\"clamp(14px,4vw,18px) clamp(14px,4vw,18px) clamp(20px,5vw,28px)\"}}>\n          <div style={{padding:\"11px 14px\",background:\"#ffffff07\",borderRadius:11,border:\"1.5px solid #ffffff0a\",marginBottom:11}}>\n            <p style={{fontSize:\"clamp(8px,2.2vw,10px)\",color:\"#ffffff55\",letterSpacing:1,fontFamily:\"'Orbitron',monospace\",marginBottom:4}}>SOBRE</p>\n            <p style={{fontSize:\"clamp(12px,3.5vw,14px)\",color:\"#ffffffdd\",lineHeight:1.6}}>{p.bio}</p>\n          </div>\n          {p.int && (\n            <div style={{display:\"flex\",gap:7,flexWrap:\"wrap\",marginBottom:13}}>\n              {p.int.split(\",\").map(tag=><span key={tag} style={{background:\"#AA00FF18\",border:\"1.5px solid #AA00FF33\",borderRadius:20,padding:\"5px 12px\",fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#AA00FF\",fontWeight:600}}>\u2726 {tag.trim()}</span>)}\n            </div>\n          )}\n          {/* GPS info */}\n          <div style={{display:\"flex\",alignItems:\"center\",gap:10,padding:\"10px 13px\",background:\"#00B4FF0a\",border:\"1.5px solid #00B4FF22\",borderRadius:11,marginBottom:14}}>\n            <span style={{fontSize:\"clamp(16px,4.5vw,20px)\"}}>\ud83d\udce1</span>\n            <div>\n              <div style={{fontSize:\"clamp(12px,3.5vw,14px)\",fontWeight:700,color:\"#00B4FF\"}}>A {p.dist} de voc\u00ea</div>\n              <div style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff55\"}}>GPS em tempo real via haversine \u00b7 {p.lat?.toFixed(4)},{p.lon?.toFixed(4)}</div>\n            </div>\n          </div>\n          <div style={{display:\"flex\",gap:9}}>\n            <button onClick={onLike}\n              style={{background:p.lk?\"linear-gradient(135deg,#FF005522,#FF005533)\":\"#ffffff0a\",\n                border:`1.5px solid ${p.lk?\"#FF005555\":\"#ffffff15\"}`,borderRadius:13,\n                padding:\"clamp(11px,3vw,14px) clamp(14px,4vw,18px)\",\n                color:p.lk?\"#FF0055\":\"#ffffff88\",fontSize:\"clamp(17px,4.5vw,22px)\",transition:\"all .2s\",flexShrink:0}}>\n              {p.lk?\"\u2764\ufe0f\":\"\ud83e\udd0d\"}\n            </button>\n            <button onClick={onChat}\n              style={{flex:1,background:\"linear-gradient(135deg,#AA00FF,#FF0055)\",border:\"none\",borderRadius:13,\n                padding:\"clamp(11px,3vw,14px)\",color:\"#fff\",fontSize:\"clamp(12px,3.5vw,14px)\",\n                fontWeight:700,fontFamily:\"'Orbitron',monospace\",letterSpacing:.5,\n                boxShadow:\"0 4px 20px #AA00FF44\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",gap:8}}>\n              <span style={{fontSize:\"clamp(15px,4.2vw,19px)\"}}>\ud83d\udcac</span> INICIAR CHAT\n            </button>\n          </div>\n          <p style={{textAlign:\"center\",fontSize:\"clamp(9px,2.5vw,10px)\",color:\"#ffffff33\",marginTop:10}}>Perfil an\u00f4nimo \u00b7 apenas o nome secreto \u00e9 vis\u00edvel</p>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n\n// \u2550\u2550\u2550 TICKETS VIEW \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction TicketsView({ tickets, onBuy, isAdmin }) {\n  return (\n    <div style={{padding:\"0 12px\"}}>\n      <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",marginBottom:14}}>\n        <h3 style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(11px,3vw,13px)\",letterSpacing:2,color:\"#FFD700\"}}>\ud83c\udfab INGRESSOS \u00b7 BSB</h3>\n      </div>\n      {!isAdmin && (\n        <div style={{padding:\"10px 13px\",background:\"#AA00FF0d\",border:\"1.5px solid #AA00FF22\",borderRadius:11,marginBottom:14,display:\"flex\",gap:9,alignItems:\"center\"}}>\n          <span style={{fontSize:\"clamp(14px,4vw,18px)\"}}>\u2139\ufe0f</span>\n          <span style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffffcc\",lineHeight:1.5}}>Publica\u00e7\u00e3o de eventos exclusiva do <strong style={{color:\"#AA00FF\"}}>administrador</strong>. Taxa: <strong style={{color:\"#FFD700\"}}>15%</strong> por ingresso.</span>\n        </div>\n      )}\n      {tickets.map(t=>(\n        <div key={t.id} onClick={()=>onBuy(t)}\n          style={{background:\"#0c0c1a\",border:\"1.5px solid #ffffff0d\",borderRadius:16,\n            padding:\"clamp(12px,3.5vw,15px)\",marginBottom:\"clamp(8px,2.5vw,11px)\",\n            cursor:\"pointer\",display:\"flex\",gap:\"clamp(10px,3vw,14px)\",alignItems:\"center\"}}>\n          <div style={{fontSize:\"clamp(28px,8vw,36px)\",flexShrink:0}}>{t.ico}</div>\n          <div style={{flex:1,minWidth:0}}>\n            <div style={{fontWeight:700,fontSize:\"clamp(13px,3.5vw,15px)\",color:\"#fff\",marginBottom:2,whiteSpace:\"nowrap\",overflow:\"hidden\",textOverflow:\"ellipsis\"}}>{t.event}</div>\n            <div style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffff88\",marginBottom:5}}>\ud83d\udcc5 {t.date} \u00b7 \ud83d\udccd {t.venue}</div>\n            <div style={{display:\"flex\",alignItems:\"center\",gap:8}}>\n              <span style={{fontSize:\"clamp(13px,3.5vw,15px)\",fontWeight:700,color:\"#FFD700\",flexShrink:0}}>{t.price}</span>\n              <div style={{flex:1,height:4,background:\"#ffffff0a\",borderRadius:2}}>\n                <div style={{width:`${(t.sold/t.cap)*100}%`,height:\"100%\",background:\"linear-gradient(90deg,#00E676,#00B4FF)\",borderRadius:2}} />\n              </div>\n              <span style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff55\",flexShrink:0}}>{Math.round((t.sold/t.cap)*100)}%</span>\n            </div>\n            {t.pn>0 && <div style={{fontSize:\"clamp(8px,2.2vw,10px)\",color:\"#ffffff44\",marginTop:3}}>Taxa plataforma: R${t.fee.toFixed(2)} (15%)</div>}\n          </div>\n        </div>\n      ))}\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 NEARBY VIEW \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction NearbyView({ nearby, me, gps, setGps, onProfile, onLike }) {\n  return (\n    <div style={{padding:\"0 12px\"}}>\n      <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",marginBottom:14}}>\n        <h3 style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(11px,3vw,13px)\",letterSpacing:2,color:\"#fff\"}}>\ud83d\udce1 POR PERTO</h3>\n        <div style={{display:\"flex\",alignItems:\"center\",gap:8}}>\n          <span style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:gps?\"#00E676\":\"#ffffff55\"}}>{gps?\"GPS ativo\":\"GPS off\"}</span>\n          <Tog on={gps} set={setGps} />\n        </div>\n      </div>\n      {me && (\n        <div style={{padding:\"10px 13px\",background:\"#AA00FF0d\",border:\"1.5px solid #AA00FF22\",borderRadius:12,marginBottom:14,display:\"flex\",gap:12,alignItems:\"center\"}}>\n          <Av init={me.av} size={42} img={me.np||me.img} />\n          <div style={{flex:1,minWidth:0}}>\n            <div style={{fontSize:\"clamp(11px,3vw,13px)\",fontWeight:700,color:\"#fff\"}}>Seu perfil Por Perto</div>\n            <div style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#AA00FF\"}}>Nome: <strong>{me.nn||me.username}</strong></div>\n          </div>\n          <button style={{background:\"#AA00FF22\",border:\"1.5px solid #AA00FF44\",borderRadius:9,padding:\"7px 11px\",color:\"#AA00FF\",fontSize:\"clamp(10px,2.8vw,12px)\",fontFamily:\"'Orbitron',monospace\"}}>Editar</button>\n        </div>\n      )}\n      {!gps\n        ? <div style={{textAlign:\"center\",padding:\"clamp(32px,8vw,52px) 20px\"}}>\n            <div style={{fontSize:\"clamp(36px,10vw,50px)\",marginBottom:11}}>\ud83d\udce1</div>\n            <p style={{color:\"#ffffff77\",fontSize:\"clamp(12px,3.5vw,14px)\",lineHeight:1.6}}>Ative o GPS para ver<br/>quem est\u00e1 perto de voc\u00ea</p>\n          </div>\n        : <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:\"clamp(8px,2.5vw,12px)\"}}>\n            {nearby.filter(u=>!u.bl).map(u=>(\n              <div key={u.id} style={{background:\"#0c0c1a\",border:\"1.5px solid #ffffff0d\",borderRadius:15,overflow:\"hidden\",cursor:\"pointer\"}}\n                onClick={()=>onProfile(u)}>\n                <div style={{position:\"relative\"}}>\n                  <img src={u.p2} alt=\"\" style={{width:\"100%\",aspectRatio:\"1\",objectFit:\"cover\"}} onError={e=>{e.target.src=u.p1;}} />\n                  {u.on && <div style={{position:\"absolute\",top:\"clamp(6px,2vw,9px)\",right:\"clamp(6px,2vw,9px)\",width:\"clamp(8px,2.5vw,11px)\",height:\"clamp(8px,2.5vw,11px)\",borderRadius:\"50%\",background:\"#00E676\",border:\"2px solid #0c0c1a\",boxShadow:\"0 0 6px #00E676\"}} />}\n                  <div style={{position:\"absolute\",bottom:\"clamp(6px,2vw,8px)\",left:\"clamp(6px,2vw,8px)\",background:\"#000000bb\",backdropFilter:\"blur(8px)\",borderRadius:8,padding:\"3px clamp(6px,2vw,9px)\",display:\"flex\",alignItems:\"center\",gap:3}}>\n                    <span style={{fontSize:\"clamp(8px,2.2vw,10px)\"}}>\ud83d\udccd</span>\n                    <span style={{fontFamily:\"'Orbitron',monospace\",fontSize:\"clamp(9px,2.5vw,11px)\",fontWeight:700,color:\"#00B4FF\"}}>{u.dist}</span>\n                  </div>\n                  <div style={{position:\"absolute\",bottom:0,left:0,right:0,background:\"linear-gradient(transparent,#0c0c1a 90%)\",padding:\"clamp(18px,5vw,24px) 9px clamp(5px,1.5vw,8px)\"}}>\n                    <div style={{fontWeight:700,fontSize:\"clamp(11px,3.2vw,13px)\",color:\"#fff\"}}>{u.sn}</div>\n                    <div style={{fontSize:\"clamp(9px,2.5vw,11px)\",color:\"#ffffff88\"}}>{u.age} anos</div>\n                  </div>\n                </div>\n                <div style={{padding:\"clamp(6px,2vw,8px) clamp(8px,2.5vw,10px) clamp(8px,2.5vw,11px)\",display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\"}}>\n                  <span style={{fontSize:\"clamp(10px,2.8vw,12px)\",color:\"#ffffffcc\",flex:1,overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\"}}>{u.bio}</span>\n                  <button onClick={e=>{e.stopPropagation();onLike(u.id);}} style={{color:u.lk?\"#FF0055\":\"#ffffff55\",fontSize:\"clamp(16px,4.5vw,20px)\",filter:u.lk?\"drop-shadow(0 0 5px #FF0055)\":\"none\",transition:\"all .2s\",marginLeft:6,lineHeight:1,flexShrink:0}}>\n                    {u.lk?\"\u2764\ufe0f\":\"\ud83e\udd0d\"}\n                  </button>\n                </div>\n              </div>\n            ))}\n          </div>\n      }\n    </div>\n  );\n}\n\n// \u2550\u2550\u2550 MY TICKETS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255
